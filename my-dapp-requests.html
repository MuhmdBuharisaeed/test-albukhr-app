<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My dApp Requests | ALBUKHR</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/albukhr-ui.css">
<link rel="stylesheet" href="css/global-header.css">
<link rel="stylesheet" href="css/app-alert.css">

<style>
.section{padding:16px}

.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.meta{
  font-size:12px;
  color:#555;
  margin-top:4px;
  line-height:1.6;
}

.status{
  font-size:12px;
  font-weight:700;
  margin-top:8px;
}

.pending{color:#856404}
.approved{color:#0f7a3d}
.rejected{color:#b02a37}

.desc{
  margin-top:10px;
  font-size:12px;
  line-height:1.6;
  background:#f7f9f8;
  padding:10px;
  border-radius:8px;
}

.notice{
  font-size:12px;
  background:#f6fbf8;
  border-left:4px solid #0f7a3d;
  padding:10px;
  margin-top:10px;
  line-height:1.6;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 14px;
  background:#0f7a3d;
  color:#fff;
  border-radius:10px;
  font-size:13px;
  text-decoration:none;
  font-weight:700;
}

.receipt{
  margin-top:10px;
}

.receipt img{
  display:block;
  width:100%;
  max-width:320px;
  max-height:220px;
  object-fit:cover;
  margin:8px auto 0;
  border-radius:10px;
  border:1px solid #e5e5e5;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.empty{
  text-align:center;
  color:#777;
  font-size:13px;
  padding:30px;
}
</style>
</head>

<body>

<header class="header">
  <h1 class="brand">ALBUKHR</h1>
</header>

<section class="section">
  <h3>📂 My dApp Requests</h3>
  <div id="list">
    <div class="empty">Loading requests...</div>
  </div>
</section>

<!-- ORDER YA DAWO HAKA -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/app-alert.js"></script>
<script src="js/pi-auth.js"></script>
<script src="js/my-dapp-requests.js"></script>

<div id="appAlert" class="app-alert">
  <div class="app-alert-box">
    <h3 id="appAlertTitle">Notice</h3>
    <p id="appAlertText"></p>
    <button onclick="closeAppAlert()">OK</button>
  </div>
</div>

</body>
</html>
