  data.stakes.forEach(s=>{

     CONFORM STAKE
=============================== */

async function confirmStake(){

  const amount = Number(amountInput.value);
  const duration = Number(durationSelect.value);
  const min = getMinStake(PROJECT_NAME);

  if(!amount || amount < min){
    alert("Minimum stake is " + min + " Pi");
    return;
  }

  const user = await ensurePiAuth();

if(!user?.uid){
  alert("Pi login failed");
  return;
}

  const btn =
    document.querySelector("#stakeModal .primary");

  btn.innerText = "Processing...";
  btn.disabled = true;

  try{

    const result = await addStake({
      project: PROJECT_NAME,
      amount,
      duration
    });

    if(result?.error){
      throw new Error(result.error);
    }

    successText.innerText =
      `You staked ${amount} Pi in ${CONFIG.title}`;

    closeModal();

    successModal.style.display = "flex";

    await load();

  }catch(e){

    console.error("FULL ERROR:", e);

    alert(
      JSON.stringify(e, null, 2)
    );

  }

  btn.innerText = "Confirm";
  btn.disabled = false;

}

  try{

    await initPi();

    await ensurePiAuth();

    await load();

/* ===============================
   LOAD
=============================== */
async function load(){

  console.log("LOADING DATA..."); // ✅ ADD NAN

  let data;

  try{
    data = await getProjectTotals(PROJECT_NAME);

    console.log("DATA:", data); // ✅ ADD NAN

      (e.message || JSON.stringify(e))
    );

    return;
  }

/* ===============================
CALCULATE TOTAL STAKE
=============================== */

data.stakes.forEach(s=>{

const amount = Number(s.amount) || 0;

if(s.type === "stake"){
  totalStake += amount;
}

if(s.type === "capital"){
  totalStake -= Math.abs(amount);
}

});

/* ===============================
CALCULATE REWARD
=============================== */

let reward = 0;

data.stakes.forEach(s=>{

const remaining =
(Number(s.reward) || 0) -
(Number(s.withdrawnReward) || 0);

reward += Math.max(0, remaining);

});

/* ===============================
UPDATE UI
=============================== */

aStake.innerText =
totalStake.toFixed(2) + " Pi";

aReward.innerText =
reward.toFixed(2) + " Pi";

await renderHistory();

/* LOCK STATUS */
updateStakeStatus();

  }
  
setTimeout(()=>{
  load();
}, 2000);
  
/* ===============================
SHORT WALLET
=============================== */
function shortWallet(address){

if(!address) return "";

return address.slice(0,6)
+ "..."
+ address.slice(-4);

 }

/* ===============================
   HISTORY (UNIFIED)
=============================== */
async function renderHistory(){

  projectHistory.innerHTML = "";

  const stakes = await getAllStakesMerged();

const txs = stakes
  .filter(tx => tx.project === PROJECT_NAME)
  .sort((a,b)=>
    new Date(b.created_at || 0) -
    new Date(a.created_at || 0)
  );

  if(!txs.length){
    projectHistory.innerHTML = `
      <div style="text-align:center;padding:20px;color:#777">
        ${CONFIG.icon}
        <br><br>
        No transactions yet
      </div>
    `;
    return;
  }

  txs.forEach(tx=>{

    const txType =
  (tx.type || "stake").toLowerCase();

    let icon = CONFIG.icon;
    let label = "Stake";
    let sign = "+";
    let color = "success-status";

    if(txType === "withdraw"){
      icon = "💸";
      label = "Withdraw";
      sign = "-";
      color = "withdraw-status";
    }

    if(txType === "reward"){
      icon = "🎁";
      label = "Reward";
    }
    
    if(txType === "capital"){
      icon = "🏦";
      label = "Capital";
      sign = "-";
      color = "withdraw-status";
    }

    const div = document.createElement("div");
div.className="project-tx";

div.innerHTML = `
<div class="project-icon">${icon}</div>

<div class="project-body">

<div class="project-title">${label}</div>

${tx.meta?.wallet ? `
<div style="font-size:11px;color:#666">
Wallet: ${shortWallet(tx.meta.wallet)}
</div>
` : ""}

<div class="project-date">
${new Date(
  tx.created_at ||
  tx.timestamp ||
  Date.now()
).toLocaleString()}
</div>

</div>

<div class="project-right">
<div class="project-amount ${color}">
${sign}${Math.abs(Number(tx.amount)).toFixed(2)} Pi
</div>
</div>
`;

projectHistory.appendChild(div);

  });

  }

/* ===============================
SAVE PROJECT STAKE 
=============================== */
function saveProjectStakes(project, stakes){

  if(!Array.isArray(stakes)) return;

  const all =
    JSON.parse(localStorage.getItem("albukhr_stakes")) || [];

  const updated = all.map(s => {

    if(s.project === project){

      const found = stakes.find(x => x.id === s.id);

      return found || s;

    }

    return s;

  });

  localStorage.setItem(
    "albukhr_stakes",
    JSON.stringify(updated)
  );

  }

"Available: " + total.toFixed(2) + " Pi";

/* ===============================
UPDATE STAKE STATUS 
=============================== */
async function updateStakeStatus(){

  const user = JSON.parse(localStorage.getItem("pi_user"));

const { data, error } = await supabase
  .from("stakes")
  .select("*")
  .eq("project", PROJECT_NAME)
  .eq("userid", user.uid);
  
if(error){
  console.error(error);
  return;
}

let locked = 0;
let unlocked = 0;

const now = Date.now();

data.forEach(s=>{
const amount =
Number(s.amount)||0;

if(now >= (s.unlockTime||0)){
unlocked += amount;
}else{
locked += amount;
}

});

let text = "";

if(locked > 0){

text +=
"Locked: " +
locked.toFixed(2) +
" Pi";

}

if(unlocked > 0){

text +=
" • Unlocked: " +
unlocked.toFixed(2) +
" Pi";

}

document.getElementById("stakeStatus")
.innerText = text;

  }
