<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Marketplace</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/global-core.css">
<link rel="stylesheet" href="css/global-layout.css">
<link rel="stylesheet" href="css/global-components.css">
<link rel="stylesheet" href="css/global-style.css">
<link rel="stylesheet" href="css/marketplace.css">

</head>

<body>

<header class="header">

  <div class="header-left">
    <span class="brand">ALBUKHR</span>
  </div>

  <div class="header-right">

    <button
      class="header-btn"
      onclick="location.href='notifications.html'">

      🔔

      <span
        id="notifBadge"
        class="notification-badge">
      </span>

    </button>

  </div>

</header>

<!-- SEARCH -->

<div class="market-controls">

  <input
    id="projectSearch"
    type="text"
    placeholder="🔎 Search projects...">

  <select id="sortProjects">

    <option value="">
      Sort Projects
    </option>

    <option value="roi">
      Highest ROI
    </option>

    <option value="liquidity">
      Highest Liquidity
    </option>

    <option value="risk">
      Lowest Risk
    </option>

  </select>

</div>

<!-- MARKET INSIGHTS -->

<div id="marketInsights"></div>

<!-- DISCOVERY -->

<div id="discoverySection"></div>

<!-- PROJECTS -->

<div
  id="projectList"
  class="marketplace">

<div class="loading-card">

Loading Marketplace...

</div>

</div>

<!-- SCRIPTS -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-core.js"></script>

<script src="js/project-config.js"></script>

<script src="js/projects-engine.js"></script>

<script src="js/project-registry.js"></script>

<script src="js/staking.js"></script>

<script src="js/marketplace-data-engine.js"></script>

<script src="js/app-alert.js"></script>

<!-- Marketplace JS zai zo a Part 2 -->
<script>
/* ======================================
   FEATURED PROJECT
====================================== */

function renderFeaturedProject(projects){

const box =
document.getElementById(
"discoverySection"
);

if(!box) return;

if(!Array.isArray(projects) || !projects.length){

box.innerHTML = "";

return;

}

const featured =

[...projects]

.sort((a,b)=>{

const scoreA =
(Number(a.liquidity)||0) +
((Number(a.investors)||0)*10);

const scoreB =
(Number(b.liquidity)||0) +
((Number(b.investors)||0)*10);

return scoreB-scoreA;

})[0];

box.innerHTML = `

<div class="featured-project">

<div class="featured-title">

⭐ Featured Project

</div>

<div class="featured-name">

${featured.icon}
${featured.title}

</div>

<div class="featured-desc">

${featured.description}

</div>

<div class="featured-stats">

<div>

ROI

<b>

${featured.roi}%

</b>

</div>

<div>

Liquidity

<b>

${Number(featured.liquidity).toFixed(2)} Pi

</b>

</div>

<div>

Investors

<b>

${featured.investors}

</b>

</div>

</div>

<button
class="invest-btn"
onclick="location.href='project.html?project=${featured.key}'">

Open Project

</button>

</div>

`;

  }

/* ======================================
   MARKET INSIGHTS
====================================== */

function renderMarketInsights(projects){

const box =
document.getElementById(
"marketInsights"
);

if(!box) return;

if(!Array.isArray(projects)){

projects = [];

}

const hotProjects =

[...projects]

.sort((a,b)=>

(Number(b.investors)||0)-

(Number(a.investors)||0)

)

.slice(0,3);

const liquidityLeaders =

[...projects]

.sort((a,b)=>

(Number(b.liquidity)||0)-

(Number(a.liquidity)||0)

)

.slice(0,3);

box.innerHTML = `

<div class="market-box">

<h3>🔥 Hot Projects</h3>

${
hotProjects.length

? hotProjects.map(p=>`

<div class="market-item">

<span>

${p.icon}
${p.title}

</span>

<b>

${p.investors||0}

Investors

</b>

</div>

`).join("")

: "<div>No data</div>"
}

</div>

<div class="market-box">

<h3>💧 Liquidity Leaders</h3>

${
liquidityLeaders.length

? liquidityLeaders.map(p=>`

<div class="market-item">

<span>

${p.icon}
${p.title}

</span>

<b>

${Number(p.liquidity||0).toFixed(2)}

Pi

</b>

</div>

`).join("")

: "<div>No data</div>"
}

</div>

`;

}

/* ======================================
   MARKETPLACE ENGINE
====================================== */

async function renderMarketplace(){

const container =
document.getElementById("projectList");

container.innerHTML = `
<div class="loading-card">
Loading Marketplace...
</div>
`;

try{

let projects = [];

if(
window.AlbukhrMarketplace &&
typeof AlbukhrMarketplace.getProjects === "function"
){

projects =
await AlbukhrMarketplace.getMarketplace();

}

if(!Array.isArray(projects)){
projects = [];
}

/* SEARCH */

const keyword =
document
.getElementById("projectSearch")
.value
.trim();

projects =
await AlbukhrMarketplace.search(keyword);

/* SORT */

const sort =
document
.getElementById("sortProjects")
.value;

if(sort==="roi"){

projects.sort(
(a,b)=>
(Number(b.roi)||0)-
(Number(a.roi)||0)
);

}else if(sort==="liquidity"){

projects.sort(
(a,b)=>
(Number(b.liquidity)||0)-
(Number(a.liquidity)||0)
);

}else if(sort==="risk"){

projects.sort(
(a,b)=>
(Number(a.riskScore)||0)-
(Number(b.riskScore)||0)
);

}

container.innerHTML = "";

if(projects.length===0){

container.innerHTML = `

<div class="loading-card">

No projects found.

</div>

`;

return;

}

projects.forEach(project=>{

renderProjectCard(project);

});

renderMarketInsights(projects);

renderFeaturedProject(projects);

}catch(err){

console.error(err);

container.innerHTML = `

<div class="loading-card">

Marketplace failed to load.

</div>

`;

}

  }

/* ======================================
   PROJECT CARD
====================================== */

function renderProjectCard(project){

const container =
document.getElementById("projectList");

const liquidity =
Number(project.liquidity) || 0;

const target =
Number(project.target) || 100;

const funded =
Math.min(
(liquidity / target) * 100,
100
);

const investors =
Number(project.investors) || 0;

/* ===============================
   BADGES
=============================== */

let badges = "";

if(investors >= 20){

badges += `
<span class="trend-badge">
🔥 Trending
</span>
`;

}

if((Number(project.roi) || 0) >= 10){

badges += `
<span class="roi-badge">
🏆 High ROI
</span>
`;

}

if((Number(project.liquidity) || 0) >= 1000){

badges += `
<span class="liquidity-badge">
💧 Strong Liquidity
</span>
`;

}

if(project.project_type === "core"){

badges += `
<span class="core-badge">
⭐ Core
</span>
`;

}

const card =
document.createElement("div");

card.className = "project-card";

card.onclick = ()=>{

location.href =
`project.html?project=${project.key}`;

};

card.innerHTML = `

<div class="project-header">

<div class="project-icon">

${project.icon || "📦"}

</div>

<div style="flex:1">

<div class="project-title">

${project.title}

</div>

<div
style="
margin-top:5px;
display:flex;
gap:6px;
flex-wrap:wrap;
">

${badges}

</div>

<div class="project-category">

${project.category || ""}

</div>

</div>

</div>

<div class="project-desc">

${project.description || ""}

</div>

<div class="row">

<span>ROI</span>

<b>${Number(project.roi)||0}%</b>

</div>

<div class="row">

<span>Duration</span>

<b>${project.durations || "-"}</b>

</div>

<div class="row">

<span>Liquidity</span>

<b>${liquidity.toFixed(2)} Pi</b>

</div>

<div class="row">

<span>Investors</span>

<b>${investors}</b>

</div>

<div class="row">

<span>Minimum Stake</span>

<b>${project.minimum || 10} Pi</b>

</div>

<div class="progress">

<div
class="progress-bar"
style="width:${funded}%">

</div>

</div>

<div
style="
margin-top:6px;
font-size:12px;
color:#666;
text-align:right;
">

${funded.toFixed(1)}% Funded

</div>

<button
class="invest-btn"
onclick="event.stopPropagation();invest('${project.key}')">

Invest Now

</button>

`;

container.appendChild(card);

  }

/* ======================================
   INVEST ENGINE
====================================== */

async function invest(projectKey){

try{

const project =
getProjectConfig(projectKey);

if(!project){

showAlert(
"Project Not Found",
"Unable to load project information."
);

return;

}

const minimum =
Number(getMinStake(projectKey)) || 10;

const amountText = prompt(

`Enter stake amount

Minimum: ${minimum} Pi`

);

if(amountText === null){

return;

}

const amount =
Number(amountText);

if(
!Number.isFinite(amount) ||
amount < minimum
){

showAlert(
"Invalid Amount",
`Minimum stake is ${minimum} Pi`
);

return;

}

/* ===============================
SELECT DURATION
=============================== */

const duration = Number(

project.durations?.[0] || 30

);

/* ===============================
CREATE STAKE
=============================== */

const result = await addStake({

project:projectKey,

amount,

duration

});

if(result?.error){

showAlert(

"Investment Failed",

result.error

);

return;

}

/* ===============================
SUCCESS
=============================== */

showAlert(

"Investment Successful",

`You successfully invested ${amount} Pi in ${project.title}.`

);

await renderMarketplace();

}catch(error){

console.error(error);

showAlert(

"Marketplace Error",

error.message || "Investment failed."

);

}

  }
renderMarketplace();
</script>

</body>
</html>
