<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Marketplace</title>

<!-- Global Styles -->
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/global-core.css">
<link rel="stylesheet" href="css/global-layout.css">
<link rel="stylesheet" href="css/global-components.css">
<link rel="stylesheet" href="css/global-style.css">

<!-- Marketplace -->
<link rel="stylesheet" href="css/marketplace.css">
<link rel="stylesheet" href="css/marketplace-app-alert.css">

</head>

<body>

<header class="header">

  <div class="header-left">
  <span class="brand">ALBUKHR</span>
  </div>

<div class="header-right">
<div class="header-btn notification-btn">
🔔
<span id="notifBadge" class="notification-badge"></span>
</div>
</div>

</header>

<div class="market-controls">

<input
type="text"
id="projectSearch"
placeholder="🔎 Search projects..."
oninput="renderMarketplace()">

<select id="sortProjects" onchange="renderMarketplace()">
<option value="">Sort</option>
<option value="roi">Highest ROI</option>
<option value="liquidity">Highest Liquidity</option>
<option value="risk">Lowest Risk</option>
</select>

</div>

<section class="market-section">

<div class="section-header">

<h2>Marketplace Insights</h2>

</div>

<div
id="marketInsights"
class="market-insights-slider">

</div>

</section>

<div id="discoverySection" style="padding:0 12px"></div>
<div class="marketplace" id="projectList"></div>

<!-- =========================================
     INVEST MODAL
========================================= -->

<div id="investModal" class="app-alert">

  <div class="app-alert-box">

    <div class="app-alert-header">

      <h3>Invest in Project</h3>

      <button
        class="app-alert-close"
        onclick="closeInvestModal()">
        ✕
      </button>

    </div>

    <p id="investProjectName"></p>

    <input
      type="number"
      id="investAmount"
      placeholder="Enter amount (Pi)"
      min="0"
      style="
      width:100%;
      padding:12px;
      margin:15px 0;
      border:1px solid #ddd;
      border-radius:10px;
      box-sizing:border-box;
      ">

    <div class="app-alert-actions">

      <button
        class="app-alert-btn"
        onclick="confirmInvestment()">

        Invest Now

      </button>

    </div>

  </div>

</div>

<!-- =========================================
     ALBUKHR APP ALERT
========================================= -->

<div id="appAlert" class="app-alert">

  <div class="app-alert-box">

    <div class="app-alert-header">

      <h3 id="appAlertTitle">
        Notice
      </h3>

      <button
        class="app-alert-close"
        onclick="closeAppAlert()">
        ✕
      </button>

    </div>

    <div
      id="appAlertIcon"
      class="app-alert-icon">
      ℹ️
    </div>

    <p id="appAlertText">
      Message...
    </p>

    <div class="app-alert-actions">

      <button
        id="appAlertButton"
        class="app-alert-btn"
        onclick="closeAppAlert()">

        OK

      </button>

    </div>

  </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Core -->
<script src="js/supabase-core.js"></script>

<!-- Authentication -->
<script src="js/pi-auth.js"></script>

<!-- Payment -->
<script src="js/pi-payment.js"></script>

<!-- Staking -->
<script src="js/staking.js"></script>

<!-- Ecosystem -->
<script src="js/ecosystem-engine.js"></script>

<!-- Alerts -->
<script src="js/app-alert.js"></script>

<script>
let CURRENT_PROJECT = null;
/* =========================================
   ALBUKHR MARKETPLACE v2
   UI Controller
   Powered by Ecosystem Engine
========================================= */

/* =========================================
   GLOBAL STATE
========================================= */

let MARKET = null;

let PROJECTS = [];

let FILTERED = [];

let REFRESHING = false;

const REFRESH_INTERVAL = 10000;

/* =========================================
   DOM
========================================= */

const projectList =
document.getElementById("projectList");

const marketInsights =
document.getElementById("marketInsights");

const discoverySection =
document.getElementById("discoverySection");

const searchInput =
document.getElementById("projectSearch");

const sortSelect =
document.getElementById("sortProjects");

/* =========================================
   INITIALIZE
========================================= */

document.addEventListener(

"DOMContentLoaded",

async ()=>{

await initializeMarketplace();

});

/* =========================================
   INITIALIZE MARKETPLACE
========================================= */

async function initializeMarketplace(){

try{

showLoading();

MARKET =
await AlbukhrEcosystem.marketplace(true);

PROJECTS =
Array.isArray(MARKET.projects)

? [...MARKET.projects]

: [];

FILTERED =
[...PROJECTS];

renderMarketplace();

renderMarketInsights();

renderFeaturedProject();

attachMarketplaceEvents();

startMarketplaceRefresh();

}catch(error){

console.error(error);

showMarketplaceError(error);

}

}

/* =========================================
   ATTACH EVENTS
========================================= */

function attachMarketplaceEvents(){

if(searchInput){

searchInput.oninput = ()=>{

filterMarketplace();

};

}

if(sortSelect){

sortSelect.onchange = ()=>{

sortMarketplace();

};

}

}

/* =========================================
   SHOW LOADING
========================================= */

function showLoading(){

projectList.innerHTML=`

<div class="loading-card">

<div class="skeleton"
style="height:28px;width:60%;"></div>

<div class="skeleton"></div>

<div class="skeleton"></div>

<div class="skeleton"
style="width:80%;"></div>

</div>

<div class="loading-card">

<div class="skeleton"
style="height:28px;width:50%;"></div>

<div class="skeleton"></div>

<div class="skeleton"></div>

<div class="skeleton"
style="width:70%;"></div>

</div>

`;

}

/* =========================================
   SHOW ERROR
========================================= */

function showMarketplaceError(error){

projectList.innerHTML = `

<div class="loading-card">

⚠️ Marketplace failed to load.

</div>

`;

}

/* =========================================
   RENDER MARKETPLACE
========================================= */

function renderMarketplace(){

if(!projectList) return;

projectList.innerHTML = "";

if(!FILTERED.length){

projectList.innerHTML = `

<div class="loading-card">

No projects available.

</div>

`;

return;

}

FILTERED.forEach(project=>{

renderProjectCard(project);

});

}

/* =========================================
   SEARCH
========================================= */

function filterMarketplace(){

const keyword =

(searchInput?.value || "")

.trim()

.toLowerCase();

FILTERED = PROJECTS.filter(project=>{

return(

String(project.title)

.toLowerCase()

.includes(keyword)

||

String(project.description)

.toLowerCase()

.includes(keyword)

||

String(project.category)

.toLowerCase()

.includes(keyword)

);

});

sortMarketplace(false);

  }

/* =========================================
   SORT
========================================= */

function sortMarketplace(render=true){

const sort =

sortSelect?.value || "";

switch(sort){

case "roi":

FILTERED.sort(

(a,b)=>

(Number(b.roi)||0)-

(Number(a.roi)||0)

);

break;

case "liquidity":

FILTERED.sort(

(a,b)=>

(Number(b.liquidity)||0)-

(Number(a.liquidity)||0)

);

break;

case "risk":

FILTERED.sort(

(a,b)=>

(Number(a.risk?.score)||0)-

(Number(b.risk?.score)||0)

);

break;

default:

FILTERED.sort(

(a,b)=>

(a.sortOrder||9999)-

(b.sortOrder||9999)

);

}

if(render){

renderMarketplace();

}

  }

/* =========================================
   PROJECT CARD
========================================= */

function renderProjectCard(project){

const card = document.createElement("div");

card.className = "project-card";

card.onclick = () => {

location.href =
`project.html?project=${project.code}`;

};

const liquidity =
Number(project.liquidity) || 0;

const investors =
Number(project.investors) || 0;

const roi =
Number(project.roi) || 0;

const minimum =
Number(project.minimum) || 1;

const target =
Number(project.target) || 1000;

const funded =
Math.min((liquidity / target) * 100,100);

const risk =
project.risk?.risk || "LOW";

let badges = "";

if(project.type==="core"){

badges +=
'<span class="core-badge">⭐ CORE</span>';

}

if(investors>=20){

badges +=
'<span class="trend">🔥 Trending</span>';

}

if(roi>=15){

badges +=
'<span class="roi-badge">📈 High ROI</span>';

}

if(liquidity>=1000){

badges +=
'<span class="liquidity-badge">💧 Strong Liquidity</span>';

}

badges += `

<span class="risk-badge ${risk.toLowerCase()}">

⚠ ${risk}

</span>

`;

card.innerHTML = `

<div class="project-header">

<div class="project-icon">

${project.icon || "📦"}

</div>

<div style="flex:1">

<div class="project-title">

${project.title}

</div>

<div class="project-category">

${project.category}

</div>

<div class="badge-group">

${badges}

</div>

</div>

</div>

<div class="project-desc">

${project.description}

</div>

<div class="project-info">

<div class="info-box">

<span>ROI</span>

<b>${roi}%</b>

</div>

<div class="info-box">

<span>Liquidity</span>

<b>${liquidity.toFixed(2)} Pi</b>

</div>

<div class="info-box">

<span>Investors</span>

<b>${investors}</b>

</div>

<div class="info-box">

<span>Risk</span>

<b>${risk}</b>

</div>

</div>

<div class="project-progress">

<div class="progress-label">

<span>Funding Progress</span>

<span>${funded.toFixed(1)}%</span>

</div>

<div class="progress">

<div

class="progress-bar"

style="width:${funded}%">

</div>

</div>

</div>

<div class="roi-box">

<div class="roi-title">

ROI Calculator

</div>

<input

class="roi-input"

type="number"

min="${minimum}"

placeholder="Minimum ${minimum} Pi"

oninput="updateROI(this,${roi})"

>

<div class="roi-result">

<span>Expected Return</span>

<b>0.00 Pi</b>

</div>

</div>

<button

class="invest-btn"

onclick="
event.stopPropagation();
openInvestModal(
MARKET.projects.find(
p=>p.code==='${project.code}'
)
);
">

Invest Now

</button>

`;

projectList.appendChild(card);

}

/* =========================================
   ROI CALCULATOR
========================================= */

function updateROI(input,roi){

const amount =
Number(input.value)||0;

const result =

(amount*roi)/100;

input.nextElementSibling.innerHTML =

`Expected Return:
<b>${result.toFixed(2)} Pi</b>`;

}

/* =========================================
   MARKET INSIGHTS
========================================= */

function renderMarketInsights(){

if(!marketInsights || !MARKET) return;

const hot =
MARKET.hotProjects || [];

const liquidity =
MARKET.liquidityLeaders || [];

const investors =
MARKET.topInvestors || [];

marketInsights.innerHTML = `

<div class="market-box">

<h3>🔥 Hot Projects</h3>

${
hot.length

?

hot.map(project=>`

<div class="market-item">

<span>

${project.icon}
${project.title}

</span>

<b>

${project.investors}

Investors

</b>

</div>

`).join("")

:

"<div>No data available</div>"

}

</div>

<div class="market-box">

<h3>💧 Liquidity Leaders</h3>

${
liquidity.length

?

liquidity.map(project=>`

<div class="market-item">

<span>

${project.icon}
${project.title}

</span>

<b>

${Number(project.liquidity).toFixed(2)} Pi

</b>

</div>

`).join("")

:

"<div>No data available</div>"

}

</div>

<div class="market-box">

<h3>🏆 Top Investors</h3>

${

investors.length

?

investors.map(user=>`

<div class="market-item">

<span>

${user.user}

</span>

<b>

${Number(user.amount).toFixed(2)} Pi

</b>

</div>

`).join("")

:

"<div>No data available</div>"

}

</div>

`;

}

/* =========================================
   FEATURED PROJECT
========================================= */

function renderFeaturedProject(){

if(!discoverySection || !MARKET) return;

const project = MARKET.featured;

if(!project){

    discoverySection.innerHTML = "";

    return;

}

const liquidity =
Number(project.liquidity) || 0;

const target =
Number(project.target) || 100;

const funded =
Math.min((liquidity / target) * 100, 100);

discoverySection.innerHTML = `

<div class="featured-project">

    <div class="featured-title">

        ⭐ FEATURED PROJECT

    </div>

    <div class="featured-name">

        ${project.icon || "📦"}

        ${project.title}

    </div>

    <div class="featured-desc">

        ${project.description || "No description available."}

    </div>

    <div class="featured-stats">

        <div class="featured-stat">

            <span>ROI</span>

            <b>${Number(project.roi || 0)}%</b>

        </div>

        <div class="featured-stat">

            <span>Liquidity</span>

            <b>${liquidity.toFixed(2)} Pi</b>

        </div>

        <div class="featured-stat">

            <span>Investors</span>

            <b>${project.investors || 0}</b>

        </div>

    </div>

    <div class="featured-progress">

        <div

            class="featured-progress-bar"

            style="width:${funded}%">

        </div>

    </div>

    <div style="
        text-align:right;
        font-size:12px;
        margin-bottom:14px;
        opacity:.9;
    ">

        ${funded.toFixed(1)}% Funded

    </div>

    <button

        class="featured-btn"

        onclick="location.href='project.html?project=${project.code}'">

        Open Project →

    </button>

</div>

`;

}

/* =========================================
   INVEST
========================================= */

async function invest(projectCode){

try{

const project =

MARKET.projects.find(

p=>p.code===projectCode

);

if(!project){

showAlert(

"Project Not Found",

"Unable to load project."

);

return;

}

const amountText = prompt(

`Enter stake amount

Minimum: ${project.minimum} Pi`

);

if(amountText===null){

return;

}

const amount =
Number(amountText);

if(

!Number.isFinite(amount)

||

amount < project.minimum

){

showAlert(

"Invalid Amount",

`Minimum stake is ${project.minimum} Pi`

);

return;

}

const duration =

Number(project.durations?.[0] || 30);

const result =

await AlbukhrEcosystem.invest({

project:project.code,

amount,

duration

});

if(result?.error){

showAlert(

"Investment Failed",

result.error

);

return;

}

showAlert(

"Investment Successful",

`You invested ${amount} Pi in ${project.title}.`

);

await refreshMarketplace();

}catch(error){

console.error(error);

showAlert(

"Marketplace Error",

error.message

);

}

  }

function openInvestModal(project){

CURRENT_PROJECT = project;

document.getElementById(
"investProjectName"
).innerHTML =

`Project: <b>${project.title}</b><br>
Minimum: ${project.minimum} Pi`;

document.getElementById(
"investAmount"
).value = "";

document
.getElementById("investModal")
.classList
.add("show");

  }

  function closeInvestModal(){

document
.getElementById("investModal")
.classList
.remove("show");

CURRENT_PROJECT = null;

  }

  async function confirmInvestment(){

if(!CURRENT_PROJECT) return;

const amount = Number(
document.getElementById(
"investAmount"
).value
);

if(
!Number.isFinite(amount) ||
amount < CURRENT_PROJECT.minimum
){

showAlert(
"Invalid Amount",
`Minimum investment is ${CURRENT_PROJECT.minimum} Pi`,
"warning"
);

return;

}

closeInvestModal();

const result =
await AlbukhrEcosystem.invest({

project:CURRENT_PROJECT.code,

amount,

duration:
CURRENT_PROJECT.durations?.[0] || 30

});

if(result?.error){

showAlert(
"Investment Failed",
result.error,
"error"
);

return;

}

showAlert(
"Investment Successful",
`${amount} Pi invested in ${CURRENT_PROJECT.title}.`,
"success"
);

await refreshMarketplace();

  }

/* =========================================
   REFRESH
========================================= */

async function refreshMarketplace(){

if(REFRESHING){

return;

}

REFRESHING = true;

try{

MARKET =

await AlbukhrEcosystem.marketplace(true);

PROJECTS =

[...MARKET.projects];

filterMarketplace();

renderMarketInsights();

renderFeaturedProject();

}catch(error){

console.error(error);

}

REFRESHING = false;

}

/* =========================================
   AUTO REFRESH
========================================= */

function startMarketplaceRefresh(){

setInterval(

refreshMarketplace,

REFRESH_INTERVAL

);

}

/* =========================================
   ROI
========================================= */

function calculateROI(

amount,

roi

){

amount =
Number(amount)||0;

roi =
Number(roi)||0;

return(

(amount*roi)/100

).toFixed(2);

}
</script>

</body>
</html>
