<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Marketplace</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/global-core.css">
<link rel="stylesheet" href="css/global-layout.css">
<link rel="stylesheet" href="css/global-components.css">
<link rel="stylesheet" href="css/global-style.css">
<link rel="stylesheet" href="css/marketplace.css">


</head>

<body>

<header class="header">

  <div class="header-left">
  <span class="brand">ALBUKHR</span>
  </div>

<div class="header-right">
<div class="header-btn notification-btn">
🔔
<span id="notifBadge" class="notification-badge"></span>
</div>
</div>

</header>

<div class="market-controls">

<input
type="text"
id="projectSearch"
placeholder="🔎 Search projects..."
oninput="renderMarketplace()">

<select id="sortProjects" onchange="renderMarketplace()">
<option value="">Sort</option>
<option value="roi">Highest ROI</option>
<option value="liquidity">Highest Liquidity</option>
<option value="risk">Lowest Risk</option>
</select>

</div>

<div id="marketInsights" style="padding:10px 12px"></div>
<div id="discoverySection" style="padding:0 12px"></div>
<div class="marketplace" id="projectList"></div>

<script src="js/project-config.js"></script>
<script src="project-creation-engine.js"></script>
<script src="project-registry.js"></script>
<script src="staking.js"></script>
<script src="smart-liquidity-engine.js"></script>
<script src="js/core-liquidity-engine.js"></script>
<script src="risk-engine.js"></script>
<script src="marketplace-engine.js"></script>
<script src="project-discovery-engine.js"></script>
<script src="liquidity-pool-engine.js"></script>
<script src="capital-protection-engine.js"></script>
<script src="js/notifications.js"></script>
<script src="js/ownership-engine.js"></script>
<script src="js/marketplace-pro-engine.js"></script>
<script src="js/project-discovery-algorithm.js"></script>
<script src="albukhr-economic-intelligence-engine.js"></script>
<script>
function renderMarketInsights(){

const box = document.getElementById("marketInsights");

if(!box) return;

const hot =
typeof getHotProjects === "function"
? getHotProjects()
: [];

const investors =
typeof getTopInvestors === "function"
? getTopInvestors()
: [];

const liquidity =
typeof getLiquidityLeaderboard === "function"
? getLiquidityLeaderboard()
: [];

box.innerHTML = `

<div style="background:#fff;padding:12px;border-radius:14px;margin-bottom:8px">

<b>🔥 Hot Projects</b><br>
${hot.map(p=>{

const key = normalizeProjectName(p.name);

return `
${PROJECT_CONFIG[key]?.icon || "📦"}
${PROJECT_CONFIG[key]?.title || p.name}
`;

}).join("<br>")}

</div>

<div style="background:#fff;padding:12px;border-radius:14px;margin-bottom:8px">

<b>🏆 Top Investors</b><br>
${investors.map(i=>
`${i.user} — ${i.amount.toFixed(2)} Pi`
).join("<br>")}

</div>

<div style="background:#fff;padding:12px;border-radius:14px;margin-bottom:8px">

<b>💧 Liquidity Leaders</b><br>
${liquidity.map(p=>{

const key = normalizeProjectName(p.name);

return `
${PROJECT_CONFIG[key]?.icon || "📦"}
${PROJECT_CONFIG[key]?.title || p.name}
 — ${p.liquidity.toFixed(2)} Pi
`;

}).join("<br>")}

</div>
`;
}

function isCoreProject(name){

const key = normalizeProjectName(name);

return ALBUKHR_CORE_PROJECTS.includes(key);

}

function normalizeProjectName(name){

if(!name) return name;

const map = {

"Barsh Agro":"Barsh",
"Barsh Agro & Livestock":"Barsh",

"Labbaika Bakery":"Labbaika",
"Labbaika Bakery Center":"Labbaika",

"Raheem Pharma":"Raheem",
"Raheem Pharmacy":"Raheem",

"Urban Mobility":"Urban",
"Urban Transport":"Urban",

"Khairat Fertiliser":"Khairat",
"Khairat Recycling":"Khairat",

"Azman Futures Makers Lab":"Azman",
"Azman Chemical":"Azman",

"Hauwal Sumonviter":"Hauwal",
"Hauwal Maize":"Hauwal"

};

return map[name] || name;

  }

function calculateROI(amount, roi){

amount = Number(amount) || 0;
roi = Number(roi) || 0;

return (amount * roi / 100).toFixed(2);

}

async function renderMarketplace(){

const container = document.getElementById("projectList");
container.innerHTML = "";

// ✅ FETCH ONCE ONLY
let stakes = [];

try{
  if(typeof getAllStakesMerged === "function"){
    stakes = await getAllStakesMerged();
  }
}catch(e){
  console.error("Stake load failed", e);
  stakes = [];
}

let allProjects = [];

try{

  if(typeof PROJECT_CONFIG === "object"){

    allProjects = Object.keys(PROJECT_CONFIG).map(p => ({
      name: p,
      roi: PROJECT_CONFIG[p]?.roi || 0,
      description: PROJECT_CONFIG[p]?.desc || ""
    }));

  }

}catch(e){

  console.error("PROJECT_CONFIG error", e);
  allProjects = [];

  }

/* SEARCH */

const search =
document.getElementById("projectSearch")?.value
?.toLowerCase() || "";

let projects =
allProjects.filter(p => {

const key = normalizeProjectName(p.name);

return (
p.name.toLowerCase().includes(search) ||
(PROJECT_CONFIG[key]?.title || "")
.toLowerCase()
.includes(search) ||

(PROJECT_CONFIG[key]?.desc || "")
.toLowerCase()
.includes(search) ||

(p.description || "")
.toLowerCase()
.includes(search)

);

});

/* SORT */

const sort =
document.getElementById("sortProjects")?.value;

if(sort === "roi"){
projects.sort((a,b)=>(b.roi||0)-(a.roi||0));
}

if(sort === "liquidity"){
projects.sort((a,b)=>
(getProjectTreasuryStatus(
normalizeProjectName(b.name)
)?.liquidity||0) -

(getProjectTreasuryStatus(
normalizeProjectName(a.name)
)?.liquidity||0)
);
}

if(sort === "risk"){
projects.sort((a,b)=>{

const ra =
getProjectRisk(
normalizeProjectName(a.name)
)?.score || 0;

const rb =
getProjectRisk(
normalizeProjectName(b.name)
)?.score || 0;

return rb - ra;

});
}

if(!projects.length){

container.innerHTML =
'<div class="empty">No projects available</div>';

return;

  }

projects.forEach(project => {

const projectKey = normalizeProjectName(project.name);

const card = document.createElement("div");

card.className = "project-card";

card.onclick = () =>
location.href = `project.html?project=${projectKey}`;

/* TREASURY */
const treasury =
typeof getProjectTreasuryStatus === "function"
? getProjectTreasuryStatus(project.name)
: {liquidity:0};

const liquidity =
Number(treasury.liquidity) || 0;

/* FUNDED */
const funded =
Math.min((liquidity / (project.target || 1000))*100,100);

/* INVESTORS */
const investors =
stakes.filter(s => s.project === projectKey).length;

/* RISK */
const riskData =
typeof getProjectRisk === "function"
? getProjectRisk(projectKey)
: {risk:"LOW"};

card.innerHTML = `

<div class="project-header">

<div class="project-icon">
${PROJECT_CONFIG[projectKey]?.icon || "📦"}
</div>

<div class="project-title">

${PROJECT_CONFIG[projectKey]?.title || project.name}

${PROJECT_CONFIG[projectKey] ? 
'<span class="core-badge">CORE</span>' : ''}

${investors > 20 ? 
'<span class="trend">🔥 Trending</span>' : ''}

</div>
</div>

<div class="project-desc">
${PROJECT_CONFIG[projectKey]?.desc || project.description || ""}
</div>

<div class="row">
<div>ROI</div>
<div>${project.roi || PROJECT_CONFIG[projectKey]?.roi || 0}%</div>
</div>

<div class="row">
<div>Liquidity</div>
<div>${liquidity.toFixed(2)} Pi</div>
</div>

<div class="row">
<div>Investors</div>
<div>${investors}</div>
</div>

<div class="row">
<div>Minimum</div>
<div>${typeof getMinStake === "function"
? getMinStake(projectKey)
: (project.minimum || 1)} Pi</div>
</div>

<div class="row">
<div>Risk</div>
<div class="risk ${riskData.risk.toLowerCase()}">
${riskData.risk}
</div>
</div>

<div class="row">
<div>Pool Liquidity</div>
<div>${
(typeof getPoolStatus==="function"
? getPoolStatus(project.name)?.liquidity || 0
: 0).toFixed(2)
} Pi</div>
</div>

<div class="progress">
<div class="progress-bar" style="width:${funded}%"></div>
</div>

<div class="roi-box">

ROI Calculator

<input
type="number"
placeholder="Enter amount"
oninput="this.nextElementSibling.innerText =
calculateROI(this.value, ${project.roi || 0}) + ' Pi'
">

<div style="margin-top:4px;font-weight:600">
0 Pi
</div>

</div>

<button  
class="invest-btn"  
onclick="event.stopPropagation(); invest('${projectKey}')">

Invest

</button>

`;

container.appendChild(card);

});

}

function invest(project){

const amount =
prompt("Enter investment amount (Pi)");

if(!amount || Number(amount)<=0){

alert("Invalid amount");
return;

}

createStake({
project: project,
amount: Number(amount)
});

alert("Investment successful");

}

/* INITIAL RENDER */

renderMarketplace();
renderMarketInsights();

if(typeof renderDiscovery === "function"){
  renderDiscovery();
}

/* AUTO REFRESH */
setInterval(()=>{
renderMarketplace();
renderMarketInsights();

if(typeof renderDiscovery === "function"){
  renderDiscovery();
}

},5000);
  
</script>

</body>
</html>
