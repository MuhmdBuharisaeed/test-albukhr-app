<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Marketplace</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/global-core.css">
<link rel="stylesheet" href="css/global-layout.css">
<link rel="stylesheet" href="css/global-components.css">
<link rel="stylesheet" href="css/global-style.css">
<link rel="stylesheet" href="css/marketplace.css">


</head>

<body>

<header class="header">

  <div class="header-left">
  <span class="brand">ALBUKHR</span>
  </div>

<div class="header-right">
<div class="header-btn notification-btn">
🔔
<span id="notifBadge" class="notification-badge"></span>
</div>
</div>

</header>

<div class="market-controls">

<input
type="text"
id="projectSearch"
placeholder="🔎 Search projects..."
oninput="renderMarketplace()">

<select id="sortProjects" onchange="renderMarketplace()">
<option value="">Sort</option>
<option value="roi">Highest ROI</option>
<option value="liquidity">Highest Liquidity</option>
<option value="risk">Lowest Risk</option>
</select>

</div>

<div id="marketInsights" style="padding:10px 12px"></div>
<div id="discoverySection" style="padding:0 12px"></div>
<div class="marketplace" id="projectList"></div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Core -->
<script src="js/supabase-core.js"></script>

<!-- Authentication -->
<script src="js/pi-auth.js"></script>

<!-- Payment -->
<script src="js/pi-payment.js"></script>

<!-- Staking -->
<script src="js/staking.js"></script>

<!-- Ecosystem -->
<script src="js/ecosystem-engine.js"></script>

<!-- Alerts -->
<script src="js/app-alert.js"></script>

<!-- Marketplace Controller -->
<script>
    // Sabon marketplace.js code ɗinmu
</script>

<script>
/* =========================================
   ALBUKHR MARKETPLACE v2
   UI Controller
   Powered by Ecosystem Engine
========================================= */

/* =========================================
   GLOBAL STATE
========================================= */

let MARKET = null;

let PROJECTS = [];

let FILTERED = [];

let REFRESHING = false;

const REFRESH_INTERVAL = 10000;

/* =========================================
   DOM
========================================= */

const projectList =
document.getElementById("projectList");

const marketInsights =
document.getElementById("marketInsights");

const discoverySection =
document.getElementById("discoverySection");

const searchInput =
document.getElementById("projectSearch");

const sortSelect =
document.getElementById("sortProjects");

/* =========================================
   INITIALIZE
========================================= */

document.addEventListener(

"DOMContentLoaded",

async ()=>{

await initializeMarketplace();

});

/* =========================================
   INITIALIZE MARKETPLACE
========================================= */

async function initializeMarketplace(){

try{

showLoading();

MARKET =
await AlbukhrEcosystem.marketplace(true);

PROJECTS =
Array.isArray(MARKET.projects)

? [...MARKET.projects]

: [];

FILTERED =
[...PROJECTS];

renderMarketplace();

renderMarketInsights();

renderFeaturedProject();

attachMarketplaceEvents();

startMarketplaceRefresh();

}catch(error){

console.error(error);

showMarketplaceError(error);

}

}

/* =========================================
   ATTACH EVENTS
========================================= */

function attachMarketplaceEvents(){

if(searchInput){

searchInput.oninput = ()=>{

filterMarketplace();

};

}

if(sortSelect){

sortSelect.onchange = ()=>{

sortMarketplace();

};

}

}

/* =========================================
   SHOW LOADING
========================================= */

function showLoading(){

projectList.innerHTML = `

<div class="loading-card">

Loading Marketplace...

</div>

`;

}

/* =========================================
   SHOW ERROR
========================================= */

function showMarketplaceError(error){

projectList.innerHTML = `

<div class="loading-card">

⚠️ Marketplace failed to load.

</div>

`;

}

/* =========================================
   RENDER MARKETPLACE
========================================= */

function renderMarketplace(){

if(!projectList) return;

projectList.innerHTML = "";

if(!FILTERED.length){

projectList.innerHTML = `

<div class="loading-card">

No projects available.

</div>

`;

return;

}

FILTERED.forEach(project=>{

renderProjectCard(project);

});

}

/* =========================================
   SEARCH
========================================= */

function filterMarketplace(){

const keyword =

(searchInput?.value || "")

.trim()

.toLowerCase();

FILTERED = PROJECTS.filter(project=>{

return(

String(project.title)

.toLowerCase()

.includes(keyword)

||

String(project.description)

.toLowerCase()

.includes(keyword)

||

String(project.category)

.toLowerCase()

.includes(keyword)

);

});

sortMarketplace(false);

  }

/* =========================================
   SORT
========================================= */

function sortMarketplace(render=true){

const sort =

sortSelect?.value || "";

switch(sort){

case "roi":

FILTERED.sort(

(a,b)=>

(Number(b.roi)||0)-

(Number(a.roi)||0)

);

break;

case "liquidity":

FILTERED.sort(

(a,b)=>

(Number(b.liquidity)||0)-

(Number(a.liquidity)||0)

);

break;

case "risk":

FILTERED.sort(

(a,b)=>

(Number(a.risk?.score)||0)-

(Number(b.risk?.score)||0)

);

break;

default:

FILTERED.sort(

(a,b)=>

(a.sortOrder||9999)-

(b.sortOrder||9999)

);

}

if(render){

renderMarketplace();

}

  }

/* =========================================
   PROJECT CARD
========================================= */

function renderProjectCard(project){

const card =
document.createElement("div");

card.className = "project-card";

card.onclick = ()=>{

location.href =
`project.html?project=${project.code}`;

};

const liquidity =
Number(project.liquidity)||0;

const investors =
Number(project.investors)||0;

const roi =
Number(project.roi)||0;

const minimum =
Number(project.minimum)||10;

const target =
Number(project.target)||100;

const funded =
Math.min(

(liquidity/target)*100,

100

);

const risk =
project.risk?.risk || "UNKNOWN";

const riskScore =
project.risk?.score || 0;

let badges = "";

if(project.type==="core"){

badges +=

'<span class="core-badge">⭐ CORE</span>';

}

if(investors>=20){

badges +=

'<span class="trend">🔥 Trending</span>';

}

if(roi>=10){

badges +=

'<span class="roi-badge">🏆 High ROI</span>';

}

if(liquidity>=1000){

badges +=

'<span class="liquidity-badge">💧 Strong Liquidity</span>';

}

card.innerHTML = `

<div class="project-header">

<div class="project-icon">

${project.icon || "📦"}

</div>

<div style="flex:1">

<div class="project-title">

${project.title}

</div>

<div style="
margin-top:5px;
display:flex;
gap:6px;
flex-wrap:wrap;
">

${badges}

</div>

<div class="project-category">

${project.category}

</div>

</div>

</div>

<div class="project-desc">

${project.description}

</div>

<div class="row">

<span>ROI</span>

<b>${roi}%</b>

</div>

<div class="row">

<span>Liquidity</span>

<b>${liquidity.toFixed(2)} Pi</b>

</div>

<div class="row">

<span>Investors</span>

<b>${investors}</b>

</div>

<div class="row">

<span>Minimum Stake</span>

<b>${minimum} Pi</b>

</div>

<div class="row">

<span>Risk</span>

<div class="risk ${risk.toLowerCase()}">

${risk}

</div>

</div>

<div class="progress">

<div
class="progress-bar"
style="width:${funded}%">

</div>

</div>

<div style="
margin-top:6px;
font-size:12px;
color:#666;
text-align:right;
">

${funded.toFixed(1)}% Funded

</div>

<div class="roi-box">

<div style="
font-weight:700;
margin-bottom:6px;
">

ROI Calculator

</div>

<input

type="number"

min="${minimum}"

placeholder="Minimum ${minimum} Pi"

oninput="updateROI(this,${roi})"

>

<div class="roi-result">

Expected Return:

<b>0 Pi</b>

</div>

<button

class="invest-btn"

onclick="event.stopPropagation();invest('${project.code}')">

Invest Now

</button>

</div>

`;

projectList.appendChild(card);

  }

/* =========================================
   ROI CALCULATOR
========================================= */

function updateROI(input,roi){

const amount =
Number(input.value)||0;

const result =

(amount*roi)/100;

input.nextElementSibling.innerHTML =

`Expected Return:
<b>${result.toFixed(2)} Pi</b>`;

}

/* =========================================
   MARKET INSIGHTS
========================================= */

function renderMarketInsights(){

if(!marketInsights || !MARKET) return;

const hot =
MARKET.hotProjects || [];

const liquidity =
MARKET.liquidityLeaders || [];

const investors =
MARKET.topInvestors || [];

marketInsights.innerHTML = `

<div class="market-box">

<h3>🔥 Hot Projects</h3>

${
hot.length

?

hot.map(project=>`

<div class="market-item">

<span>

${project.icon}
${project.title}

</span>

<b>

${project.investors}

Investors

</b>

</div>

`).join("")

:

"<div>No data available</div>"

}

</div>

<div class="market-box">

<h3>💧 Liquidity Leaders</h3>

${
liquidity.length

?

liquidity.map(project=>`

<div class="market-item">

<span>

${project.icon}
${project.title}

</span>

<b>

${Number(project.liquidity).toFixed(2)} Pi

</b>

</div>

`).join("")

:

"<div>No data available</div>"

}

</div>

<div class="market-box">

<h3>🏆 Top Investors</h3>

${

investors.length

?

investors.map(user=>`

<div class="market-item">

<span>

${user.user}

</span>

<b>

${Number(user.amount).toFixed(2)} Pi

</b>

</div>

`).join("")

:

"<div>No data available</div>"

}

</div>

`;

}

/* =========================================
   FEATURED PROJECT
========================================= */

function renderFeaturedProject(){

if(!discoverySection || !MARKET) return;

const project =
MARKET.featured;

if(!project){

discoverySection.innerHTML="";

return;

}

discoverySection.innerHTML = `

<div class="featured-project">

<div class="featured-title">

⭐ Featured Project

</div>

<div class="featured-name">

${project.icon}

${project.title}

</div>

<div class="featured-desc">

${project.description}

</div>

<div class="featured-stats">

<div>

ROI

<b>

${project.roi}%

</b>

</div>

<div>

Liquidity

<b>

${Number(project.liquidity).toFixed(2)} Pi

</b>

</div>

<div>

Investors

<b>

${project.investors}

</b>

</div>

</div>

<button

class="invest-btn"

onclick="location.href='project.html?project=${project.code}'">

Open Project

</button>

</div>

`;

}

/* =========================================
   INVEST
========================================= */

async function invest(projectCode){

try{

const project =

MARKET.projects.find(

p=>p.code===projectCode

);

if(!project){

showAlert(

"Project Not Found",

"Unable to load project."

);

return;

}

const amountText = prompt(

`Enter stake amount

Minimum: ${project.minimum} Pi`

);

if(amountText===null){

return;

}

const amount =
Number(amountText);

if(

!Number.isFinite(amount)

||

amount < project.minimum

){

showAlert(

"Invalid Amount",

`Minimum stake is ${project.minimum} Pi`

);

return;

}

const duration =

Number(project.durations?.[0] || 30);

const result =

await AlbukhrEcosystem.invest({

project:project.code,

amount,

duration

});

if(result?.error){

showAlert(

"Investment Failed",

result.error

);

return;

}

showAlert(

"Investment Successful",

`You invested ${amount} Pi in ${project.title}.`

);

await refreshMarketplace();

}catch(error){

console.error(error);

showAlert(

"Marketplace Error",

error.message

);

}

  }

/* =========================================
   REFRESH
========================================= */

async function refreshMarketplace(){

if(REFRESHING){

return;

}

REFRESHING = true;

try{

MARKET =

await AlbukhrEcosystem.marketplace(true);

PROJECTS =

[...MARKET.projects];

filterMarketplace();

renderMarketInsights();

renderFeaturedProject();

}catch(error){

console.error(error);

}

REFRESHING = false;

}

/* =========================================
   AUTO REFRESH
========================================= */

function startMarketplaceRefresh(){

setInterval(

refreshMarketplace,

REFRESH_INTERVAL

);

}

/* =========================================
   ROI
========================================= */

function calculateROI(

amount,

roi

){

amount =
Number(amount)||0;

roi =
Number(roi)||0;

return(

(amount*roi)/100

).toFixed(2);

}
</script>

</body>
</html>
