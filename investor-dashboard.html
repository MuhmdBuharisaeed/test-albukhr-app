<!DOCTYPE html>

<style>

body{
margin:0;
font-family:system-ui;
background:#f4f7f6;
padding-bottom:120px;
}

.header{
background:#0f7a3d;
height:60px;
padding:0 16px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-left{
display:flex;
align-items:center;
gap:10px;
}

.header-right{
display:flex;
align-items:center;
}

.main-logo{
height:58px;
width:auto;
display:block;
object-fit:contain;

filter:
drop-shadow(0 0 0.8px #000)
drop-shadow(0 0 1px #000);
}

.brand{
color:white;
font-weight:700;
font-size:18px;
letter-spacing:1px;
}

/* HEADER SPACE */
.page{
padding:16px;
}

/* SUMMARY CARDS */

.summary-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:16px;
}

.summary-card{
background:#fff;
border-radius:16px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

.summary-title{
font-size:13px;
color:#777;
margin-bottom:6px;
}

.summary-value{
font-size:22px;
font-weight:800;
color:#0f7a3d;
}

/* QUICK ACTIONS */

.quick-actions{
display:flex;
gap:10px;
margin-bottom:16px;
}

.action-btn{
flex:1;
background:#fff;
border-radius:14px;
padding:12px;
text-align:center;
box-shadow:0 6px 16px rgba(0,0,0,0.05);
font-size:12px;
font-weight:600;
cursor:pointer;
}

/* INVESTMENTS */

.section-title{
font-weight:700;
margin-bottom:10px;
}

.invest-card{
background:#fff;
border-radius:16px;
padding:14px;
margin-bottom:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.05);
}

.invest-header{
display:flex;
justify-content:space-between;
font-weight:700;
margin-bottom:6px;
}

.row{
display:flex;
justify-content:space-between;
font-size:13px;
margin-top:4px;
}

/* WALLET BUTTON */

.wallet-btn{
margin-top:18px;
width:100%;
background:#0f7a3d;
color:#fff;
border:none;
border-radius:14px;
padding:14px;
font-weight:700;
font-size:15px;
cursor:pointer;
}

.market-wrapper{
padding:16px;
}

.market-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#1c7c3f;
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.invest-title{
padding:0 16px;
margin-top:4px;
margin-bottom:8px;
  }

.section-title{
margin-top:18px;
margin-bottom:10px;
padding:0 16px;
font-weight:700;
}

</style>

</head>

<body>

<!-- ===== ALBUKHR HEADER ===== -->

<header class="header">

  <div class="header-left">
  <span class="brand">ALBUKHR</span>
  </div>

<div class="header-right">

<div class="header-btn notification-btn" onclick="openNotifications()">

🔔

<span id="notifBadge" class="notification-badge"></span>

</div>

</div>

</header>

<div class="page">

<!-- SUMMARY -->

<div class="summary-grid">

<div class="summary-card">

<div class="summary-title">

</div>

0.00 Pi
</div>

</div>

<div class="summary-card">

<div class="summary-title">
Invested
</div>

<div class="summary-value" id="totalInvest">
0.00 Pi
</div>

</div>

<div class="summary-card">

<div class="summary-title">
Earnings
</div>

<div class="summary-value" id="totalEarn">
0.00 Pi
</div>

</div>

<div class="summary-card">

<div class="summary-title">
Projects
</div>

<div class="summary-value" id="totalProjects">
0
</div>

</div>

</div>


<!-- QUICK ACTIONS -->

<div class="quick-actions">

<div class="action-btn"
onclick="location.href='projects.html'">
Explore Projects
</div>

<div class="action-btn"
onclick="location.href='marketplace.html'">
Marketplace
</div>

</div>


<!-- OPEN MARKET -->

<button class="wallet-btn"
onclick="location.href='marketplace.html'">

Open Market Place

<!-- INVESTMENTS -->

My Investments
</div>

</div>

<!-- ===== ALBUKHR DOCK NAV ===== -->

<div class="dock-nav">

  <!-- HOME -->
  <a href="index.html" class="dock-item">
    <svg viewBox="0 0 24 24" class="dock-icon">
      <path d="M3 10L12 3l9 7v10a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/>
    </svg>
    <span>Home</span>
  </a>


  <!-- INVESTORS -->
  <a href="investor-dashboard.html" class="dock-item">
    <svg viewBox="0 0 24 24" class="dock-icon">
      <path d="M16 11c1.66 0 3-1.34 3-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3z"/>
      <path d="M8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3z"/>
      <path d="M2 20v-1c0-2.21 3.58-4 6-4s6 1.79 6 4v1z"/>
      <path d="M14 20v-1c0-1.5 1.5-2.8 3.5-3.5 2 .7 3.5 2 3.5 3.5v1z"/>
    </svg>
    <span>Investors</span>
  </a>


  <!-- TRANSPARENCY HUB -->
  <a href="transparancy.html" class="dock-item">
    <svg viewBox="0 0 24 24" class="dock-icon">
      
      <!-- Document -->
      <path d="M6 3h8l4 4v14H6z"/>

      <circle cx="12" cy="18" r="0.8"/>

  <!-- SERVICES -->

      <path d="M19.4 15a1 1 0 000-6l2-1-2-3-2 1a7 7 0 00-4-2V1H10v3a7 7 0 00-4 2l-2-1-2 3 2 1a7 7 0 000 6l-2 1 2 3 2-1a7 7 0 004 2v3h4v-3a7 7 0 004-2l2 1 2-3z"/>
    </svg>

  </a>

</div>

<script src="js/staking.js"></script>
<script src="js/notifications.js"></script>

<script>

let lastScroll = 0;
let threshold = 10;

const dock =
document.querySelector(".dock-nav");

window.addEventListener("scroll",()=>{

const current =
window.pageYOffset;

if(Math.abs(current-lastScroll)<=threshold)
return;

if(current > lastScroll){

/* scroll down */
dock.classList.add("hide");

}else{

/* scroll up */
dock.classList.remove("hide");

}

lastScroll = current;

});

</script>

<script>

const current = location.pathname.split("/").pop();

document.querySelectorAll(".dock-item").forEach(link=>{

if(link.getAttribute("href") === current){

link.classList.add("active");

}

});

</script>

<script>
async function renderInvestorDashboard(){

const container =
document.getElementById("investments");

container.innerHTML = `
<div class="invest-card"
style="text-align:center;color:#777;">
Loading investments...
</div>
`;

try{

const stakes =
await getAllStakesMerged();

if(!Array.isArray(stakes)){

throw new Error(
"Invalid investment data."
);

}

let totalInvest = 0;
let totalEarn = 0;
let totalPortfolio = 0;

const map = {};

stakes.forEach(s=>{

const amount =
Number(s.amount) || 0;

const reward =
Number(s.reward) || 0;

const withdrawn =
Number(s.withdrawnReward) || 0;

const remaining =
Math.max(0,reward-withdrawn);

const projectName =
(s.project || "Unnamed Project").trim();

totalInvest += amount;

totalPortfolio += amount;

if(s.type==="stake"){

totalEarn += remaining;

}

if(!map[projectName]){

map[projectName]={

invest:0,

earn:0,

status:"Active",

count:0

};

}

map[projectName].invest += amount;

map[projectName].count++;

if(s.type==="stake"){

map[projectName].earn += remaining;

}

});

document.getElementById(
"totalPortfolio"
).innerText =
totalPortfolio.toFixed(2)+" Pi";

document.getElementById(
"totalInvest"
).innerText =
totalInvest.toFixed(2)+" Pi";

document.getElementById(
"totalEarn"
).innerText =
totalEarn.toFixed(2)+" Pi";

document.getElementById(
"totalProjects"
).innerText =
Object.keys(map).length;

container.innerHTML="";

if(Object.keys(map).length===0){

container.innerHTML=`

<div class="invest-card"
style="text-align:center;">

<h3>No investments yet</h3>

<p style="color:#666;">

Start by exploring
approved projects.

</p>

<button
class="wallet-btn"
onclick="location.href='marketplace.html'">

Explore Marketplace

</button>

</div>

`;

return;

}

Object.entries(map).forEach(

([project,data])=>{

const card =
document.createElement("div");

card.className =
"invest-card";

card.innerHTML = `

<div class="invest-header">

<div>${project}</div>

<div style="
color:#0f7a3d;
font-weight:700;">

${data.earn.toFixed(2)} Pi

</div>

</div>

<div class="row">

<div>Invested</div>

<div>

${data.invest.toFixed(2)} Pi

</div>

</div>

<div class="row">

<div>Earnings</div>

<div style="
color:#0f7a3d;">

${data.earn.toFixed(2)} Pi

</div>

</div>

<div class="row">

<div>Status</div>

<div style="
color:#1c7c3f;
font-weight:700;">

${data.status}

</div>

</div>

<div class="row">

<div>Records</div>

<div>

${data.count}

</div>

</div>

<div
style="
margin-top:12px;
">

<div
style="
font-size:12px;
margin-bottom:6px;
color:#777;
">

Investment Progress

</div>

<div
style="
height:8px;
background:#e5e5e5;
border-radius:999px;
overflow:hidden;
">

<div
style="
width:100%;
height:100%;
background:#0f7a3d;
">

</div>

</div>

</div>

`;

container.appendChild(card);

});

}catch(error){

console.error(
"Investor Dashboard Error:",
error
);

container.innerHTML = `

<div class="invest-card"
style="text-align:center;">

<h3>

Unable to load investments

</h3>

<p
style="color:#666;">

Please check your
internet connection
or try again later.

</p>

<button
class="wallet-btn"
onclick="renderInvestorDashboard()">

Retry

</button>

</div>

`;

}

}

renderInvestorDashboard();

</script>
