<script>

let lastScroll = 0;
let threshold = 10;

const dock =
document.querySelector(".dock-nav");

window.addEventListener("scroll",()=>{

const current =
window.pageYOffset;

if(Math.abs(current-lastScroll)<=threshold)
return;

if(current > lastScroll){

/* scroll down */
dock.classList.add("hide");

}else{

/* scroll up */
dock.classList.remove("hide");

}

lastScroll = current;

});

</script>

<script>

const current = location.pathname.split("/").pop();

document.querySelectorAll(".dock-item").forEach(link=>{

if(link.getAttribute("href") === current){

link.classList.add("active");

}

});

</script>

<script>

async function renderInvestorDashboard(){

const stakes = await getAllStakesMerged();

let totalInvest = 0;
let totalEarn = 0;

const map = {};

stakes.forEach(s=>{

const amount = Number(s.amount) || 0;

totalInvest += amount;

if(s.type === "stake"){

const remaining =
(Number(s.reward)||0) -
(Number(s.withdrawnReward)||0);

totalEarn += Math.max(0, remaining);

}

if(!map[s.project]){
map[s.project] = {invest:0, earn:0};
}

map[s.project].invest += amount;

if(s.type === "stake"){

const remaining =
(Number(s.reward)||0) -
(Number(s.withdrawnReward)||0);

map[s.project].earn += Math.max(0, remaining);

}

});

document.getElementById("totalInvest").innerText =
totalInvest.toFixed(2)+" Pi";

document.getElementById("totalEarn").innerText =
totalEarn.toFixed(2)+" Pi";

const container = document.getElementById("investments");
container.innerHTML = "";

Object.keys(map).forEach(project=>{

const card = document.createElement("div");

card.className="invest-card";

card.innerHTML = `
<div class="invest-header">
<div>${project}</div>
<div>${map[project].earn.toFixed(2)} Pi</div>
</div>

<div class="row">
<div>Invested</div>
<div>${map[project].invest.toFixed(2)} Pi</div>
</div>

<div class="row">
<div>Earnings</div>
<div>${map[project].earn.toFixed(2)} Pi</div>
</div>
`;

container.appendChild(card);

});

}

renderInvestorDashboard();

</script>
