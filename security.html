<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALBUKHR Security</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,sans-serif;
background:#f6fbf8;
color:#333;
}

/* HEADER */
.header{
background:#0f7a3d;
color:#fff;
padding:25px;
text-align:center;
}

/* LAYOUT */
.security-container{
display:flex;
min-height:100vh;
}

/* LEFT */
.left{
width:40%;
background:#fff;
border-right:1px solid #eee;
padding:20px;
}

.security-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-bottom:10px;
border-radius:10px;
background:#f1f8f4;
cursor:pointer;
transition:.3s;
}

.security-item:hover{
background:#dff3e8;
}

.security-item.active{
background:#0f7a3d;
color:#fff;
}

/* TOGGLE SWITCH */
.switch{
position:relative;
width:42px;
height:22px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
border-radius:20px;
transition:.3s;
}

.slider:before{
position:absolute;
content:"";
height:16px;
width:16px;
left:3px;
top:3px;
background:white;
border-radius:50%;
transition:.3s;
}

/* ON STATE */
input:checked + .slider{
background:#0f7a3d;
}

input:checked + .slider:before{
transform:translateX(20px);
}

/* RIGHT */
.right{
width:60%;
padding:30px;
display:flex;
align-items:center;
}

.security-content h2{
color:#0f7a3d;
}

/* MOBILE */
@media(max-width:768px){
.security-container{
flex-direction:column;
}
.left,.right{
width:100%;
}
}

</style>

</head>

<body>

<div class="header">
<h1>ALBUKHR Security System</h1>
</div>

<div class="security-container">

<!-- LEFT -->
<div class="left">

<div class="security-item active" onclick="showContent(0)">
<span>🔐 2FA (PIN)</span>

<label class="switch">
<input type="checkbox" onchange="toggle(this, '2FA (PIN)')">
<span class="slider"></span>
</label>
</div>

<div class="security-item" onclick="showContent(1)">
<span>👆 Biometric</span>

<label class="switch">
<input type="checkbox" onchange="toggle(this, 'Biometric Login')">
<span class="slider"></span>
</label>
</div>

<div class="security-item" onclick="showContent(2)">
<span>🔒 Encryption</span>

<label class="switch">
<input type="checkbox" onchange="toggle(this, 'Encryption')">
<span class="slider"></span>
</label>
</div>

<div class="security-item" onclick="showContent(3)">
<span>🛡️ Protection</span>

<label class="switch">
<input type="checkbox" onchange="toggle(this, 'Transaction Protection')">
<span class="slider"></span>
</label>
</div>

<div class="security-item" onclick="showContent(4)">
<span>📊 Monitoring</span>

<label class="switch">
<input type="checkbox" onchange="toggle(this, 'Activity Monitoring')">
<span class="slider"></span>
</label>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="security-content" id="content">

<h2>Enable 2FA (PIN)</h2>
<p>
Add an extra layer of protection using a PIN before performing sensitive actions.
</p>

</div>

</div>

</div>

<script>

const data = [

{
title:"Enable 2FA (PIN)",
text:"Add an extra layer of protection by requiring a secure PIN before sensitive actions."
},

{
title:"Biometric Login",
text:"Use fingerprint or face ID for secure and fast login."
},

{
title:"Encrypt Sensitive Data",
text:"All sensitive data is protected using advanced encryption."
},

{
title:"Transaction Protection",
text:"Transactions are monitored to prevent fraud."
},

{
title:"Activity Monitoring",
text:"Real-time monitoring detects suspicious behavior."
}

];

function showContent(index){

const items = document.querySelectorAll(".security-item");

items.forEach(i => i.classList.remove("active"));
items[index].classList.add("active");

document.getElementById("content").innerHTML = `
<h2>${data[index].title}</h2>
<p>${data[index].text}</p>
`;

}

/* TOGGLE ACTION */
function toggle(el, name){

if(el.checked){
console.log(name + " ENABLED");
}else{
console.log(name + " DISABLED");
}

}

</script>

</body>
</html>
