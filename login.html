<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ALBUKHR Login</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#020617;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:400px;
    }

    h1{
      font-size:40px;
      margin-bottom:15px;
    }

    p{
      color:#aaa;
      margin-bottom:35px;
      font-size:18px;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:#6d28d9;
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      opacity:0.9;
    }

    .loading{
      margin-top:20px;
      color:#aaa;
      display:none;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>ALBUKHR</h1>

    <p>Pi Browser Secure Login</p>

    <button onclick="login()">
      Login With Pi
    </button>

    <div class="loading" id="loading">
      Authenticating...
    </div>

  </div>

  <script>

    Pi.init({
      version: "2.0",
      sandbox: true
    });

    async function login() {

      try {

        document.getElementById("loading").style.display = "block";

        const scopes = ['username', 'payments'];

        const auth = await Pi.authenticate(
          scopes,
          onIncompletePaymentFound
        );

        console.log(auth);

        // SAVE USER
        localStorage.setItem(
          "pi_user",
          JSON.stringify(auth.user)
        );

        // REDIRECT
        window.location.href = "index.html";

      } catch (err) {

        console.error(err);

        alert("Login failed");

        document.getElementById("loading").style.display = "none";
      }
    }

    function onIncompletePaymentFound(payment) {
      console.log(payment);
    }

  </script>

</body>
</html>
