<!DOCTYPE html>
<html>
<head>
  <title>ALBUKHR TESTNET LOGIN</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body{
      font-family:sans-serif;
      background:#111827;
      color:white;
      text-align:center;
      padding-top:120px;
    }

    button{
      background:#7c3aed;
      color:white;
      border:none;
      padding:14px 28px;
      border-radius:10px;
      font-size:18px;
    }
  </style>
</head>

<body>

<h1>ALBUKHR TESTNET</h1>

<p>Pi Browser Login Test</p>

<button onclick="login()">
  Login With Pi
</button>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
Pi.init({
  version: "2.0",
  sandbox: true
});

async function login() {

  try {

    const scopes = ['username', 'payments'];

    const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

    console.log(auth);

    alert("Welcome " + auth.user.username);

  } catch (err) {

    console.error(err);
    alert("Login failed");

  }

}

function onIncompletePaymentFound(payment) {
  console.log(payment);
}
</script>

</body>
</html>
