<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Albukhr Project Dashboard</title>

<link rel="stylesheet" href="css/global-header.css">
<link rel="stylesheet" href="global-buttons.css">

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f4f7f6;
  padding-bottom:110px;
  color:#111;
}

.header{
  background:#0f7a3d;
  height:60px;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-right{
  display:flex;
  align-items:center;
}

.main-logo{
  height:48px;
  width:auto;
}

.brand{
  color:#fff;
  font-weight:700;
  font-size:18px;
  letter-spacing:1px;
}

.dashboard{
  padding:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:16px;
}

.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.title{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.big{
  font-size:22px;
  font-weight:800;
  color:#0f7a3d;
  line-height:1.2;
}

.card-full{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
}

.sub{
  font-size:12px;
  color:#6f7b75;
  margin-top:6px;
  line-height:1.5;
}

input,
textarea{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:8px;
  background:#fff;
  font-family:inherit;
}

textarea{
  min-height:90px;
  resize:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#0f7a3d;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  width:100%;
}

button.secondary{
  background:#eef6f1;
  color:#0f7a3d;
}

.tx{
  display:flex;
  justify-content:space-between;
  gap:12px;
  border-top:1px dashed #eee;
  padding-top:10px;
  margin-top:10px;
  font-size:12px;
  line-height:1.5;
}

.tx-left{
  flex:1;
}

.tx-right{
  text-align:right;
  white-space:nowrap;
}

.badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  font-weight:700;
  padding:6px 10px;
  border-radius:999px;
  background:#f1f6f3;
  color:#0f7a3d;
}

.badge.core{
  background:#e9f7ef;
  color:#0f7a3d;
}

.badge.internal{
  background:#eef4ff;
  color:#1f5bd8;
}

.badge.external{
  background:#fff4e9;
  color:#b25a00;
}

.badge.active{
  background:#edf9f0;
  color:#0f7a3d;
}

.badge.inactive{
  background:#fff1f1;
  color:#b02a37;
}

.badge.archived{
  background:#f3f3f3;
  color:#666;
}

.status-low{
  color:#b02a37;
}

.status-safe{
  color:#b25a00;
}

.status-strong{
  color:#0f7a3d;
}

.loading,
.empty,
.error-box{
  background:#fff;
  padding:18px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
  font-size:14px;
}

.loading,
.empty{
  color:#66746d;
  text-align:center;
}

.error-box{
  color:#b02a37;
  border-left:4px solid #b02a37;
}

.muted{
  color:#6d7973;
  font-size:12px;
}

.project-title{
  font-size:16px;
  font-weight:800;
  margin-bottom:8px;
}

@media (max-width:820px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>

</head>

<body>

<header class="header">
  <div class="header-left">
    <img src="file_000000007c187246b1c01967ee086dc4.png" class="main-logo" alt="ALBUKHR Logo">
    <span class="brand">ALBUKHR</span>
  </div>
</header>

<div class="dashboard">

  <!-- PROJECT NAME -->
  <div class="card-full">
    <div class="title">Project</div>
    <div class="big" id="projectName">Loading...</div>
    <div class="sub" id="projectMetaLine">Preparing project dashboard...</div>

    <div class="badges" id="projectBadges"></div>
  </div>

  <!-- STATS -->
  <div class="grid">

    <div class="card">
      <div class="title">Liquidity</div>
      <div class="big" id="liquidity">0 Pi</div>
    </div>

    <div class="card">
      <div class="title">Reserve</div>
      <div class="big" id="reserve">0 Pi</div>
    </div>

    <div class="card">
      <div class="title">ROI</div>
      <div class="big" id="roi">0%</div>
    </div>

    <div class="card">
      <div class="title">Investors</div>
      <div class="big" id="investors">0</div>
    </div>

    <div class="card">
      <div class="title">Liquidity Status</div>
      <div class="big" id="liquidityStatus">LOW</div>
    </div>

    <div class="card">
      <div class="title">Usable Liquidity</div>
      <div class="big" id="usableLiquidity">0 Pi</div>
    </div>

  </div>

  <!-- ADD LIQUIDITY -->
  <div class="card-full">
    <div class="title">Add Liquidity</div>

    <input type="number" id="addAmount" placeholder="Amount">

    <button onclick="addLiquidity()">
      Add Liquidity
    </button>
  </div>

  <!-- INTERNAL WITHDRAW -->
  <div class="card-full">
    <div class="title">Internal Withdraw</div>

    <input type="number" id="withdrawAmount" placeholder="Amount">

    <button onclick="withdrawLiquidity()">
      Withdraw Liquidity
    </button>
  </div>

  <!-- PROJECT UPDATES -->
  <div class="card-full">
    <div class="project-title">📸 Project Updates</div>

    <input
      type="file"
      id="projectUpdateImage"
      accept="image/*"
    />

    <textarea
      id="projectUpdateText"
      placeholder="Describe project progress..."
    ></textarea>

    <button onclick="uploadProjectUpdate()">
      Upload Update
    </button>
  </div>

  <!-- HISTORY -->
  <div class="card-full">
    <div class="title">Treasury Activity</div>
    <div id="history" class="loading">Loading treasury history...</div>
  </div>

  <!-- STAKE BOX -->
  <div class="card-full">
    <div class="title">Project Stake Panel</div>
    <div id="projectStakeBox"></div>
  </div>

</div>

<script src="js/admin-auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-core.js"></script>

<script src="js/projects-engine.js"></script>
<script src="js/project-treasury.js"></script>
<script src="js/smart-liquidity-engine.js"></script>
<script src="js/ecosystem-treasury.js"></script>

<script src="js/staking.js"></script>
<script src="js/capital-protection-engine.js"></script>
<script src="js/albukhr-project-deployment-engine.js"></script>

<script>
/* =========================================
   ALBUKHR PROJECT DASHBOARD FINAL
   project_code-first + Supabase treasury
========================================= */

const dashboardEls = {
  projectName: document.getElementById("projectName"),
  projectMetaLine: document.getElementById("projectMetaLine"),
  projectBadges: document.getElementById("projectBadges"),

  liquidity: document.getElementById("liquidity"),
  reserve: document.getElementById("reserve"),
  roi: document.getElementById("roi"),
  investors: document.getElementById("investors"),
  liquidityStatus: document.getElementById("liquidityStatus"),
  usableLiquidity: document.getElementById("usableLiquidity"),

  history: document.getElementById("history"),

  addAmount: document.getElementById("addAmount"),
  withdrawAmount: document.getElementById("withdrawAmount")
};

const currentProjectCode =
  String(localStorage.getItem("albukhr_current_project") || "").trim();

let __projectDashboardBusy = false;
let __currentProjectMeta = null;

/* =========================================
   HELPERS
========================================= */
function formatPi(value){
  const n = Number(value || 0);
  return `${n.toFixed(2)} Pi`;
}

function safeNumber(value, fallback = 0){
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function escapeHtml(text = ""){
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatProjectType(type){
  const t = String(type || "").toLowerCase();
  if(t === "core") return "Core";
  if(t === "internal") return "Internal";
  if(t === "external") return "External";
  return "Unknown";
}

function formatProjectStatus(status){
  const s = String(status || "").toLowerCase();
  if(s === "active") return "Active";
  if(s === "inactive") return "Inactive";
  if(s === "archived") return "Archived";
  return s || "Unknown";
}

function getProjectTypeBadgeClass(type){
  const t = String(type || "").toLowerCase();
  if(t === "core") return "core";
  if(t === "internal") return "internal";
  if(t === "external") return "external";
  return "core";
}

function getProjectStatusBadgeClass(status){
  const s = String(status || "").toLowerCase();
  if(s === "active") return "active";
  if(s === "inactive") return "inactive";
  if(s === "archived") return "archived";
  return "inactive";
}

/*
  Reward formatter:
  0.02 => 2
  2 => 2
*/
function normalizePercent(value){
  const n = safeNumber(value, 0);
  if(n <= 0) return 0;
  if(n > 0 && n < 1) return n * 100;
  return n;
}

function computeLiquidityStatus(status){

  const liquidity = safeNumber(status?.liquidity, 0);
  const minLiquidity = safeNumber(status?.min_liquidity, 100);
  const usable = safeNumber(status?.max_usable_liquidity, 0);

  if(liquidity < minLiquidity){
    return {
      label:"LOW",
      className:"status-low"
    };
  }

  if(usable <= 0){
    return {
      label:"SAFE",
      className:"status-safe"
    };
  }

  return {
    label:"STRONG",
    className:"status-strong"
  };
}

/* =========================================
   PAGE GUARD
========================================= */
function ensureProjectSelected(){

  if(currentProjectCode){
    return true;
  }

  alert("Project not found");
  window.location.href = "marketplace.html";
  return false;
}

/* =========================================
   LOAD PROJECT DATA
========================================= */
async function loadProjectData(){

  if(!currentProjectCode){
    throw new Error("Missing current project code");
  }

  if(typeof getProjectMeta !== "function"){
    throw new Error("getProjectMeta() is missing from projects-engine.js");
  }

  const project = await getProjectMeta(currentProjectCode);

  if(!project){
    throw new Error(`Project not found: ${currentProjectCode}`);
  }

  let treasuryStatus = {
    liquidity:0,
    reserve:0,
    max_usable_liquidity:0,
    min_liquidity:100,
    reward_rate:0
  };

  if(typeof getProjectTreasuryStatus === "function"){
    const status = await getProjectTreasuryStatus(currentProjectCode);
    if(!status?.error){
      treasuryStatus = status;
    }
  }

  let roi = 0;
  try{
    if(typeof calculateProjectROI === "function"){
      const result = await calculateProjectROI(currentProjectCode);
      roi = safeNumber(result, 0);
    }else{
      roi = safeNumber(project.roi, 0);
    }
  }catch(e){
    console.warn("calculateProjectROI failed:", e);
    roi = safeNumber(project.roi, 0);
  }

  let allStakes = [];
  try{
    if(typeof getAllStakesMerged === "function"){
      const result = await getAllStakesMerged();
      if(Array.isArray(result)){
        allStakes = result;
      }
    }
  }catch(e){
    console.warn("getAllStakesMerged failed:", e);
  }

  const investors = allStakes.filter(stake => {
    const code = String(
      stake.project_code ||
      stake.project ||
      ""
    ).trim().toLowerCase();

    return code === currentProjectCode.toLowerCase();
  }).length;

  return {
    project,
    treasuryStatus,
    roi,
    investors
  };
}

/* =========================================
   RENDER PROJECT HEADER
========================================= */
function renderProjectHeader(project){

  dashboardEls.projectName.textContent =
    project.project_name || project.project_code || "Unknown Project";

  dashboardEls.projectMetaLine.innerHTML = `
    Code: <strong>${escapeHtml(project.project_code || "-")}</strong> •
    Type: <strong>${escapeHtml(formatProjectType(project.project_type))}</strong>
  `;

  dashboardEls.projectBadges.innerHTML = `
    <span class="badge ${escapeHtml(getProjectTypeBadgeClass(project.project_type))}">
      ${escapeHtml(formatProjectType(project.project_type))}
    </span>

    <span class="badge ${escapeHtml(getProjectStatusBadgeClass(project.status))}">
      ${escapeHtml(formatProjectStatus(project.status))}
    </span>
  `;
}

/* =========================================
   RENDER STATS
========================================= */
function renderProjectStats({
  project,
  treasuryStatus,
  roi,
  investors
}){

  const liquidity = safeNumber(treasuryStatus?.liquidity, 0);
  const reserve = safeNumber(treasuryStatus?.reserve, 0);
  const usable = safeNumber(treasuryStatus?.max_usable_liquidity, 0);

  dashboardEls.liquidity.textContent =
    formatPi(liquidity);

  dashboardEls.reserve.textContent =
    formatPi(reserve);

  dashboardEls.usableLiquidity.textContent =
    formatPi(usable);

  dashboardEls.roi.textContent =
    `${safeNumber(roi, 0).toFixed(2)}%`;

  dashboardEls.investors.textContent =
    String(investors || 0);

  const liquidityState =
    computeLiquidityStatus(treasuryStatus);

  dashboardEls.liquidityStatus.textContent =
    liquidityState.label;

  dashboardEls.liquidityStatus.className =
    `big ${liquidityState.className}`;
}

/* =========================================
   RENDER HISTORY
========================================= */
async function renderHistory(){

  if(!currentProjectCode){
    dashboardEls.history.className = "empty";
    dashboardEls.history.innerHTML = "No project selected.";
    return;
  }

  dashboardEls.history.className = "loading";
  dashboardEls.history.innerHTML = "Loading treasury history...";

  try{

    if(typeof getProjectTreasuryHistory !== "function"){
      dashboardEls.history.className = "empty";
      dashboardEls.history.innerHTML =
        "Treasury history engine not available.";
      return;
    }

    const history =
      await getProjectTreasuryHistory(currentProjectCode, 50);

    if(!Array.isArray(history) || !history.length){
      dashboardEls.history.className = "empty";
      dashboardEls.history.innerHTML = "No treasury activity yet.";
      return;
    }

    const chunks = history.map(tx => {
      const txType =
        String(tx.tx_type || "transaction")
          .replace(/_/g, " ");

      const amount =
        safeNumber(tx.amount, 0);

      const note =
        tx.note || tx.tx_type || "Treasury transaction";

      const createdAt =
        tx.created_at
          ? new Date(tx.created_at).toLocaleString()
          : "—";

      return `
        <div class="tx">
          <div class="tx-left">
            <div><strong>${escapeHtml(txType)}</strong></div>
            <div class="muted">${escapeHtml(note)}</div>
            <div class="muted">${escapeHtml(createdAt)}</div>
          </div>

          <div class="tx-right">
            ${formatPi(amount)}
          </div>
        </div>
      `;
    });

    dashboardEls.history.className = "";
    dashboardEls.history.innerHTML = chunks.join("");

  }catch(err){

    console.error("renderHistory error:", err);

    dashboardEls.history.className = "error-box";
    dashboardEls.history.innerHTML = `
      Failed to load treasury history.<br>
      <span class="muted">${escapeHtml(err?.message || "Unknown error")}</span>
    `;
  }
}

/* =========================================
   FULL DASHBOARD RENDER
========================================= */
async function updateDashboard(){

  if(__projectDashboardBusy) return;
  __projectDashboardBusy = true;

  try{

    const data = await loadProjectData();

    __currentProjectMeta = data.project;

    renderProjectHeader(data.project);
    renderProjectStats(data);
    await renderHistory();

    if(typeof renderProjectStakeUI === "function"){
      try{
        await renderProjectStakeUI(
          currentProjectCode,
          localStorage.getItem("albukhr_current_email")
        );
      }catch(e){
        console.warn("renderProjectStakeUI failed:", e);
      }
    }

  }catch(err){

    console.error("updateDashboard error:", err);

    dashboardEls.projectName.textContent = "Project load failed";
    dashboardEls.projectMetaLine.textContent =
      err?.message || "Unknown error";

    dashboardEls.history.className = "error-box";
    dashboardEls.history.innerHTML = `
      Failed to load project dashboard.<br>
      <span class="muted">${escapeHtml(err?.message || "Unknown error")}</span>
    `;
  }finally{
    __projectDashboardBusy = false;
  }
}

/* =========================================
   ADD LIQUIDITY
========================================= */
async function addLiquidity(){

  try{

    const amount =
      safeNumber(dashboardEls.addAmount.value, 0);

    if(amount <= 0){
      alert("Enter valid liquidity amount");
      return;
    }

    if(typeof safeAddProjectLiquidity !== "function"){
      alert("safeAddProjectLiquidity() not available");
      return;
    }

    const result =
      await safeAddProjectLiquidity(
        currentProjectCode,
        amount,
        {
          actor_userid: localStorage.getItem("albukhr_current_email") || "admin",
          actor_username: "ALBUKHR Admin",
          note: "Manual liquidity add from project dashboard",
          meta:{
            source:"project_dashboard_add_liquidity"
          }
        }
      );

    if(result?.error){
      alert(result.error);
      return;
    }

    dashboardEls.addAmount.value = "";
    alert("Liquidity added successfully");
    await updateDashboard();

  }catch(err){
    console.error("addLiquidity error:", err);
    alert(err?.message || "Failed to add liquidity");
  }
}

/* =========================================
   WITHDRAW LIQUIDITY
========================================= */
async function withdrawLiquidity(){

  try{

    const amount =
      safeNumber(dashboardEls.withdrawAmount.value, 0);

    if(amount <= 0){
      alert("Enter valid withdraw amount");
      return;
    }

    if(typeof safeProjectInternalWithdraw !== "function"){
      alert("safeProjectInternalWithdraw() not available");
      return;
    }

    const result =
      await safeProjectInternalWithdraw(
        currentProjectCode,
        amount,
        {
          actor_userid: localStorage.getItem("albukhr_current_email") || "admin",
          actor_username: "ALBUKHR Admin",
          note: "Manual internal withdraw from project dashboard",
          meta:{
            source:"project_dashboard_internal_withdraw"
          }
        }
      );

    if(result?.error){
      alert(result.error);
      return;
    }

    dashboardEls.withdrawAmount.value = "";
    alert("Liquidity withdrawn successfully");
    await updateDashboard();

  }catch(err){
    console.error("withdrawLiquidity error:", err);
    alert(err?.message || "Failed to withdraw liquidity");
  }
}

/* =========================================
   PROJECT UPDATE TYPE LABEL
========================================= */
function getProjectTypeLabel(projectMeta){

  const type =
    String(projectMeta?.project_type || "").toLowerCase();

  if(type === "core"){
    return "Core Project";
  }

  if(type === "internal"){
    return "Internal Project";
  }

  if(type === "external"){
    return "External Project";
  }

  return "Project";
}

/* =========================================
   UPLOAD PROJECT UPDATE
   NOTE:
   Wannan part har yanzu localStorage feed ne
   domin ba mu kai ga Supabase project_updates ba tukuna.
========================================= */
function uploadProjectUpdate(){

  const projectCode = currentProjectCode;

  if(!projectCode){
    alert("Project not found");
    return;
  }

  const file =
    document.getElementById("projectUpdateImage").files[0];

  const text =
    document.getElementById("projectUpdateText").value.trim();

  if(!file){
    alert("Select update image first");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(){

    let feed =
      JSON.parse(localStorage.getItem("albukhr_project_feed")) || [];

    feed.push({
      id: "update_" + Date.now(),
      project_code: projectCode,
      project: __currentProjectMeta?.project_name || projectCode,
      type: getProjectTypeLabel(__currentProjectMeta),
      image: reader.result,
      description: text,
      time: Date.now()
    });

    localStorage.setItem(
      "albukhr_project_feed",
      JSON.stringify(feed)
    );

    window.dispatchEvent(
      new Event("projectFeedUpdated")
    );

    document.getElementById("projectUpdateImage").value = "";
    document.getElementById("projectUpdateText").value = "";

    alert("Project update uploaded");
  };

  reader.readAsDataURL(file);
}

/* =========================================
   START
========================================= */
document.addEventListener("DOMContentLoaded", async function(){

  if(!ensureProjectSelected()) return;

  if(typeof loadProjects === "function"){
    try{
      await loadProjects();
    }catch(e){
      console.warn("Project preload warning:", e);
    }
  }

  await updateDashboard();

  /* refresh every 90 seconds */
  setInterval(async ()=>{
    await updateDashboard();
  }, 90000);

});
</script>

</body>
