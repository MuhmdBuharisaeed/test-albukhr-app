<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ALBUKHR Core Project Dashboard</title>

  <link rel="stylesheet" href="css/global-header.css" />
  <link rel="stylesheet" href="global-buttons.css" />

  <style>
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#f4f7f6;
      color:#111;
      padding-bottom:110px;
    }

    .header{
      background:#0f7a3d;
      height:60px;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 4px 16px rgba(0,0,0,0.08);
    }

    .header-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .main-logo{
      height:48px;
      width:auto;
    }

    .brand{
      color:#fff;
      font-weight:700;
      font-size:18px;
      letter-spacing:1px;
    }

    .dashboard{
      padding:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:16px;
    }

    .card{
      background:#fff;
      padding:16px;
      border-radius:14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.05);
    }

    .card-full{
      background:#fff;
      padding:16px;
      border-radius:14px;
      margin-bottom:16px;
      box-shadow:0 6px 18px rgba(0,0,0,0.05);
    }

    .title{
      font-size:13px;
      color:#666;
      margin-bottom:6px;
    }

    .big{
      font-size:22px;
      font-weight:800;
      color:#0f7a3d;
      line-height:1.2;
    }

    .sub{
      font-size:12px;
      color:#6f7b75;
      margin-top:6px;
      line-height:1.5;
    }

    .project-title{
      font-size:16px;
      font-weight:800;
      margin-bottom:8px;
      color:#111;
    }

    .badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      font-weight:700;
      padding:6px 10px;
      border-radius:999px;
      background:#f1f6f3;
      color:#0f7a3d;
    }

    .badge.core{
      background:#e9f7ef;
      color:#0f7a3d;
    }

    .badge.active{
      background:#edf9f0;
      color:#0f7a3d;
    }

    .badge.inactive{
      background:#fff1f1;
      color:#b02a37;
    }

    .badge.archived{
      background:#f3f3f3;
      color:#666;
    }

    .status-low{
      color:#b02a37;
    }

    .status-safe{
      color:#b25a00;
    }

    .status-strong{
      color:#0f7a3d;
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      margin-top:7px;
      line-height:1.5;
    }

    .row strong{
      color:#222;
    }

    input,
    textarea{
      width:100%;
      box-sizing:border-box;
      padding:10px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-top:8px;
      background:#fff;
      font-family:inherit;
    }

    textarea{
      min-height:90px;
      resize:none;
    }

    button{
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#0f7a3d;
      color:#fff;
      font-weight:600;
      cursor:pointer;
      width:100%;
    }

    button.secondary{
      background:#eef6f1;
      color:#0f7a3d;
    }

    .tx{
      display:flex;
      justify-content:space-between;
      gap:12px;
      border-top:1px dashed #eee;
      padding-top:10px;
      margin-top:10px;
      font-size:12px;
      line-height:1.5;
    }

    .tx-left{
      flex:1;
    }

    .tx-right{
      text-align:right;
      white-space:nowrap;
    }

    .loading,
    .empty,
    .error-box{
      background:#fff;
      padding:18px;
      border-radius:14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.05);
      font-size:14px;
    }

    .loading,
    .empty{
      color:#66746d;
      text-align:center;
    }

    .error-box{
      color:#b02a37;
      border-left:4px solid #b02a37;
    }

    .muted{
      color:#6d7973;
      font-size:12px;
    }

    @media (max-width:820px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <img
        src="file_000000007c187246b1c01967ee086dc4.png"
        class="main-logo"
        alt="ALBUKHR Logo"
      />
      <span class="brand">ALBUKHR CORE</span>
    </div>
  </header>

  <div class="dashboard">

    <!-- PROJECT HEADER -->
    <div class="card-full">
      <div class="title">Core Project</div>
      <div class="big" id="projectName">Loading...</div>
      <div class="sub" id="projectMetaLine">Preparing core project dashboard...</div>
      <div class="badges" id="projectBadges"></div>
    </div>

    <!-- STATS -->
    <div class="grid">

      <div class="card">
        <div class="title">Liquidity</div>
        <div class="big" id="liquidity">0 Pi</div>
      </div>

      <div class="card">
        <div class="title">Reserve</div>
        <div class="big" id="reserve">0 Pi</div>
      </div>

      <div class="card">
        <div class="title">ROI</div>
        <div class="big" id="roi">0%</div>
      </div>

      <div class="card">
        <div class="title">Investors</div>
        <div class="big" id="investors">0</div>
      </div>

      <div class="card">
        <div class="title">Liquidity Status</div>
        <div class="big" id="liquidityStatus">LOW</div>
      </div>

      <div class="card">
        <div class="title">Usable Liquidity</div>
        <div class="big" id="usableLiquidity">0 Pi</div>
      </div>

    </div>

    <!-- ADD LIQUIDITY -->
    <div class="card-full">
      <div class="title">Add Liquidity</div>

      <input
        type="number"
        id="addAmount"
        placeholder="Amount"
      />

      <button id="addLiquidityBtn">
        Add Liquidity
      </button>
    </div>

    <!-- INTERNAL WITHDRAW -->
    <div class="card-full">
      <div class="title">Internal Withdraw</div>

      <input
        type="number"
        id="withdrawAmount"
        placeholder="Amount"
      />

      <button id="withdrawLiquidityBtn">
        Withdraw Liquidity
      </button>
    </div>

    <!-- PROJECT UPDATES -->
    <div class="card-full">
      <div class="project-title">📸 Core Project Updates</div>

      <input
        type="file"
        id="projectUpdateImage"
        accept="image/*"
      />

      <textarea
        id="projectUpdateText"
        placeholder="Describe core project progress..."
      ></textarea>

      <button id="uploadProjectUpdateBtn">
        Upload Update
      </button>
    </div>

    <!-- HISTORY -->
    <div class="card-full">
      <div class="title">Treasury Activity</div>
      <div id="history" class="loading">Loading treasury history...</div>
    </div>

    <!-- STAKE PANEL -->
    <div class="card-full">
      <div class="title">Project Stake Panel</div>
      <div id="projectStakeBox"></div>
    </div>

  </div>

  <script src="js/admin-auth.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-core.js"></script>

  <script src="js/projects-engine.js"></script>
  <script src="js/project-treasury.js"></script>
  <script src="js/smart-liquidity-engine.js"></script>
  <script src="js/ecosystem-treasury.js"></script>

  <script src="js/staking.js"></script>
  <script src="js/capital-protection-engine.js"></script>
  <script src="js/albukhr-project-deployment-engine.js"></script>

  <!-- SHARED DASHBOARD BASE -->
  <script src="js/project-dashboard-base.js"></script>

  <script>
    /* =========================================
       ALBUKHR CORE PROJECT DASHBOARD FINAL
       PATCHED VERSION
       - Matches project-dashboard-base.js contract
       - Core-only page
       - Safe migration architecture
    ========================================= */

    const coreDashboardEls = {
      projectName: document.getElementById("projectName"),
      projectMetaLine: document.getElementById("projectMetaLine"),
      projectBadges: document.getElementById("projectBadges"),

      liquidity: document.getElementById("liquidity"),
      reserve: document.getElementById("reserve"),
      roi: document.getElementById("roi"),
      investors: document.getElementById("investors"),
      liquidityStatus: document.getElementById("liquidityStatus"),
      usableLiquidity: document.getElementById("usableLiquidity"),

      history: document.getElementById("history"),
      projectStakeBox: document.getElementById("projectStakeBox"),

      addAmount: document.getElementById("addAmount"),
      withdrawAmount: document.getElementById("withdrawAmount"),

      addLiquidityBtn: document.getElementById("addLiquidityBtn"),
      withdrawLiquidityBtn: document.getElementById("withdrawLiquidityBtn"),
      uploadProjectUpdateBtn: document.getElementById("uploadProjectUpdateBtn")
    };

    let __coreDashboardApp = null;
    let __coreDashboardRefreshTimer = null;

    /* =========================================
       SAFE HELPERS
    ========================================= */
    function coreEscapeHtml(text = ""){
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function coreSafeNumber(value, fallback = 0){
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    /* =========================================
       ADMIN GUARD
    ========================================= */
    function guardCoreAdmin(){
      if(typeof requireRole === "function"){
        requireRole([
          "super_admin",
          "ecosystem_admin",
          "project_admin",
          "finance_admin"
        ]);
      }

      if(typeof getAdmin === "function" && !getAdmin()){
        window.location.href = "admin-login.html";
        return false;
      }

      return true;
    }

    /* =========================================
       CORE PROJECT GUARD
       This page accepts core projects only
    ========================================= */
    async function ensureCoreProjectSelected(){

      const currentProjectCode =
        String(localStorage.getItem("albukhr_current_project") || "").trim();

      if(!currentProjectCode){
        alert("Core project not found");
        window.location.href = "Albukhr-core-projects-dashboard.html";
        return null;
      }

      if(typeof getProjectMeta !== "function"){
        alert("getProjectMeta() is missing from projects-engine.js");
        window.location.href = "Albukhr-core-projects-dashboard.html";
        return null;
      }

      let project = null;

      try{
        project = await getProjectMeta(currentProjectCode);
      }catch(e){
        console.error("ensureCoreProjectSelected getProjectMeta failed:", e);
      }

      if(!project){
        alert("Project not found");
        window.location.href = "Albukhr-core-projects-dashboard.html";
        return null;
      }

      if(String(project.project_type || "").toLowerCase() !== "core"){
        alert("This dashboard is for core projects only.");
        window.location.href = "Albukhr-core-projects-dashboard.html";
        return null;
      }

      return project;
    }

    /* =========================================
       LOCAL PROJECT UPDATE FEED
       Still localStorage for now
    ========================================= */
    function uploadCoreProjectUpdate(){

      if(!__coreDashboardApp || !__coreDashboardApp.data || !__coreDashboardApp.data.project){
        alert("Project not loaded");
        return;
      }

      const file =
        document.getElementById("projectUpdateImage").files[0];

      const text =
        document.getElementById("projectUpdateText").value.trim();

      if(!file){
        alert("Select update image first");
        return;
      }

      const project =
        __coreDashboardApp.data.project;

      const reader = new FileReader();

      reader.onload = function(){

        let feed =
          JSON.parse(localStorage.getItem("albukhr_project_feed")) || [];

        feed.push({
          id: "update_" + Date.now(),
          project_code: project.project_code,
          project: project.project_name || project.project_code,
          type: "Core Project",
          image: reader.result,
          description: text,
          time: Date.now()
        });

        localStorage.setItem(
          "albukhr_project_feed",
          JSON.stringify(feed)
        );

        window.dispatchEvent(new Event("projectFeedUpdated"));

        document.getElementById("projectUpdateImage").value = "";
        document.getElementById("projectUpdateText").value = "";

        alert("Core project update uploaded");
      };

      reader.readAsDataURL(file);
    }

    /* =========================================
       BIND ACTIONS
    ========================================= */
    function bindCoreDashboardActions(){

      coreDashboardEls.addLiquidityBtn.addEventListener("click", async function(){

        if(!__coreDashboardApp) return;

        const amount =
          coreSafeNumber(coreDashboardEls.addAmount.value, 0);

        if(amount <= 0){
          alert("Enter valid liquidity amount");
          return;
        }

        try{
          const result = await __coreDashboardApp.addLiquidity(amount, {
            actor_userid: localStorage.getItem("albukhr_current_email") || "admin",
            actor_username: "ALBUKHR Admin",
            note: "Manual liquidity add from core dashboard",
            meta:{
              source:"core_project_dashboard_add_liquidity"
            }
          });

          if(result?.error){
            alert(result.error);
            return;
          }

          coreDashboardEls.addAmount.value = "";
          alert("Liquidity added successfully");

        }catch(err){
          console.error("Core addLiquidity error:", err);
          alert(err?.message || "Failed to add liquidity");
        }
      });

      coreDashboardEls.withdrawLiquidityBtn.addEventListener("click", async function(){

        if(!__coreDashboardApp) return;

        const amount =
          coreSafeNumber(coreDashboardEls.withdrawAmount.value, 0);

        if(amount <= 0){
          alert("Enter valid withdraw amount");
          return;
        }

        try{
          const result = await __coreDashboardApp.withdrawLiquidity(amount, {
            actor_userid: localStorage.getItem("albukhr_current_email") || "admin",
            actor_username: "ALBUKHR Admin",
            note: "Manual internal withdraw from core dashboard",
            meta:{
              source:"core_project_dashboard_internal_withdraw"
            }
          });

          if(result?.error){
            alert(result.error);
            return;
          }

          coreDashboardEls.withdrawAmount.value = "";
          alert("Liquidity withdrawn successfully");

        }catch(err){
          console.error("Core withdrawLiquidity error:", err);
          alert(err?.message || "Failed to withdraw liquidity");
        }
      });

      coreDashboardEls.uploadProjectUpdateBtn.addEventListener("click", function(){
        uploadCoreProjectUpdate();
      });
    }

    /* =========================================
       START CORE DASHBOARD
       IMPORTANT:
       This now uses the REAL base.js contract:
       bootstrapProjectDashboard({
         projectCode,
         dashboardType,
         targets,
         options,
         viewerId
       })
    ========================================= */
    async function startCoreDashboard(){

      if(!guardCoreAdmin()) return;

      const project = await ensureCoreProjectSelected();
      if(!project) return;

      if(typeof bootstrapProjectDashboard !== "function"){
        coreDashboardEls.history.className = "error-box";
        coreDashboardEls.history.innerHTML =
          "bootstrapProjectDashboard() is missing from project-dashboard-base.js";
        return;
      }

      coreDashboardEls.history.className = "loading";
      coreDashboardEls.history.innerHTML = "Loading treasury history...";

      try{
        __coreDashboardApp = await bootstrapProjectDashboard({
          projectCode: project.project_code,
          dashboardType: "core",

          targets: {
            projectName: coreDashboardEls.projectName,
            projectMetaLine: coreDashboardEls.projectMetaLine,
            projectBadges: coreDashboardEls.projectBadges,

            liquidity: coreDashboardEls.liquidity,
            reserve: coreDashboardEls.reserve,
            roi: coreDashboardEls.roi,
            investors: coreDashboardEls.investors,
            liquidityStatus: coreDashboardEls.liquidityStatus,
            usableLiquidity: coreDashboardEls.usableLiquidity,

            history: coreDashboardEls.history,
            projectStakeBox: coreDashboardEls.projectStakeBox
          },

          options: {
            historyLimit: 50,
            renderStakePanel: true
          },

          viewerId: localStorage.getItem("albukhr_current_email") || ""
        });

        bindCoreDashboardActions();

        /* optional page-level auto refresh */
        if(__coreDashboardRefreshTimer){
          clearInterval(__coreDashboardRefreshTimer);
          __coreDashboardRefreshTimer = null;
        }

        __coreDashboardRefreshTimer = setInterval(async ()=>{
          if(__coreDashboardApp && typeof __coreDashboardApp.reload === "function"){
            try{
              await __coreDashboardApp.reload();
            }catch(e){
              console.warn("Core dashboard auto refresh failed:", e);
            }
          }
        }, 90000);

      }catch(err){
        console.error("Core dashboard load error:", err);

        coreDashboardEls.projectName.textContent = "Core project load failed";
        coreDashboardEls.projectMetaLine.textContent =
          err?.message || "Unknown error";

        coreDashboardEls.history.className = "error-box";
        coreDashboardEls.history.innerHTML = `
          Failed to load core project dashboard.<br>
          <span class="muted">${coreEscapeHtml(err?.message || "Unknown error")}</span>
        `;
      }
    }

    /* =========================================
       START
    ========================================= */
    document.addEventListener("DOMContentLoaded", async function(){

      if(typeof loadProjects === "function"){
        try{
          await loadProjects(true);
        }catch(e){
          console.warn("Projects preload failed:", e);
        }
      }

      await startCoreDashboard();
    });
  </script>
</body>
</html>
