<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALBUKHR Admin – dApp Requests</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/albukhr-ui.css">
<link rel="stylesheet" href="css/global-header.css">

<style>
.section{padding:16px}
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px
}
button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  margin-right:6px;
  font-size:12px;
}
.approve{background:#0f7a3d;color:#fff}
.reject{background:#eee;color:#333}

.btn.approved{background:#0f7a3d;color:#fff;cursor:default}
.btn.rejected{background:#b02a37;color:#fff;cursor:default}
.btn.disabled{opacity:.6;pointer-events:none}

.meta{
  font-size:12px;
  color:#555;
  margin-top:6px;
}
.desc{
  margin-top:8px;
  font-size:12px;
  color:#333;
  line-height:1.6;
  background:#f7f9f8;
  padding:8px;
  border-radius:8px;
}
.receipt-box{
  margin-top:10px;
  font-size:12px;
}
.receipt-box img{
  max-width:100%;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:6px;
}
.note{
  margin-top:8px;
  font-size:12px;
  color:#b02a37;
  background:#fff5f5;
  padding:6px;
  border-radius:6px;
}
.empty{
  font-size:13px;
  color:#777;
  text-align:center;
  padding:20px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/admin-dapp-requests.js"></script>

</head>

<body>

<header class="header">
  <h1 class="brand">ALBUKHR • Admin</h1>
</header>

<section class="section">
  <h3>🛠 dApp Requests Review</h3>
  <div id="adminList"></div>
</section>

</body>
</html>
