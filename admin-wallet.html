<html lang="en">
<head>

<!-- LOAD ORDER IMPORTANT -->
<script src="admin-auth.js"></script>

</head>

<!-- AUTO LIQUIDITY WARNING -->
<div id="liquidityWarning"
style="
display:none;
background:#f39c12;
color:white;
padding:12px;
text-align:center;
font-weight:700;
">

⚠️ Low Project Liquidity Detected

<body>

<div class="header">
  🔐 ALBUKHR – Admin Wallet Monitor
</div>

<div class="card">
  <small>Admin Treasury</small>
  <div class="stat" id="adminBalance">0.00 Pi</div>

  <small>Status</small>
  <div id="walletStatus">ACTIVE</div>

  <button class="btn lock" onclick="lockWalletAdmin()">Lock Wallet</button>
  <button class="btn unlock" onclick="unlockWalletAdmin()">Unlock Wallet</button>

  <div class="threshold-box">
    <small>Large Withdrawal Alert Threshold (Pi)</small>
    <input type="number" id="thresholdInput" placeholder="Default: 100">
  </div>
</div>

<div class="card">
<h4>Admin Wallet Control</h4>

<select id="adminProject">
<option value="">Select Project</option>
</select>

<input 
type="number" 
id="adminAmount"
placeholder="Amount (Pi)"
style="width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ddd">

<select id="adminType" style="width:100%;padding:10px;margin-top:8px;border-radius:10px">
<option value="reward">Add Reward</option>
<option value="capital">Add Capital</option>
<option value="stake">Add Stake</option>
</select>

<button class="btn unlock" onclick="adminAddWallet()">
Add to Wallet
</button>

</div>

<div class="card">
  <h4>Recent Withdrawals</h4>
  <div id="adminTxList"></div>
</div>

<audio id="alertSound">
  <source src="alert.mp3" type="audio/mpeg">
</audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://qexmnghilahsvethlxem.supabase.co",
  "sb_publishable_mSbWlhVKdmSjasKJC50QYw_5wzgRMe2"
);
</script>

<script>

/* ===============================
   INIT
=============================== */
document.addEventListener("DOMContentLoaded", () => {
  refreshAdminWallet();
  setInterval(refreshAdminWallet, 5000);
});

/* ===============================
   FETCH TRANSACTIONS
=============================== */
async function fetchTransactions(){

  const { data, error } = await supabase
    .from("transactions")
    .select("*")
    .order("created_at", { ascending:false });

  if(error){
    console.error(error);
    return [];
  }

  return data || [];
}

/* ===============================
   TREASURY ENGINE
=============================== */
function calculateTreasury(txs){

  let totalStake = 0;
  let totalFees = 0;
  let rewardWithdraw = 0;
  let capitalWithdraw = 0;
  let adminLiquidity = 0;

  txs.forEach(tx => {

    const amount = Number(tx.amount) || 0;
    const fee = Number(tx.fee) || 0;

    if(tx.type === "stake") totalStake += amount;
    if(tx.type === "admin-credit") adminLiquidity += amount;

    if(tx.type === "withdraw"){
      rewardWithdraw += amount;
      totalFees += fee;
    }

    if(tx.type === "capital"){
      capitalWithdraw += amount;
      totalFees += fee;
    }

  });

  const treasury =
    totalStake +
    adminLiquidity +
    totalFees -
    rewardWithdraw -
    capitalWithdraw;

  return {
    treasury,
    totalStake,
    totalFees,
    rewardWithdraw,
    capitalWithdraw,
    adminLiquidity
  };
}

/* ===============================
   HEALTH
=============================== */
function getHealth(t){
  if(t.treasury <= 0) return "CRITICAL";
  if(t.treasury < 100) return "LOW";
  return "HEALTHY";
}

/* ===============================
   RENDER SUMMARY
=============================== */
function renderSummary(t){

  document.getElementById("walletStatus").innerText =
    getHealth(t);

  document.getElementById("adminBalance").innerHTML = `
    <div style="font-size:28px;font-weight:800">
      ${t.treasury.toFixed(2)} Pi
    </div>

    <div style="margin-top:10px;font-size:12px">
      Stake: ${t.totalStake.toFixed(2)} Pi<br>
      Fees: ${t.totalFees.toFixed(2)} Pi<br>
      Reward Withdraw: ${t.rewardWithdraw.toFixed(2)} Pi<br>
      Capital Withdraw: ${t.capitalWithdraw.toFixed(2)} Pi<br>
      Liquidity: ${t.adminLiquidity.toFixed(2)} Pi
    </div>
  `;
}

/* ===============================
   RENDER TRANSACTIONS
=============================== */
function renderTransactions(txs){

  const box = document.getElementById("adminTxList");
  box.innerHTML = "";

  const withdrawals = txs.filter(tx =>
    tx.type === "withdraw" || tx.type === "capital"
  );

  if(!withdrawals.length){
    box.innerHTML = "<small>No withdrawals yet</small>";
    return;
  }

  withdrawals.forEach(tx => {

    box.innerHTML += `
      <div class="tx">
        <strong>${tx.project}</strong><br>

        Type: ${tx.type}<br>
        Amount: -${Number(tx.amount).toFixed(2)} Pi<br>
        Fee: ${Number(tx.fee || 0).toFixed(2)} Pi<br>

        Wallet:
        ${tx.wallet || "internal"}<br>

        <small>
        ${new Date(tx.created_at).toLocaleString()}
        </small>
      </div>
    `;

  });

}

/* ===============================
   ADMIN ADD LIQUIDITY
=============================== */
async function adminAddWallet(){

  const project =
    document.getElementById("adminProject").value;

  const amount =
    Number(document.getElementById("adminAmount").value);

  const type =
    document.getElementById("adminType").value;

  if(!project){
    alert("Select project");
    return;
  }

  if(!amount || amount <= 0){
    alert("Invalid amount");
    return;
  }

  const { error } = await supabase
    .from("transactions")
    .insert([{
      project,
      amount,
      type: type === "reward"
        ? "admin-credit"
        : type,
      fee: 0,
      wallet: "admin",
      created_at: new Date()
    }]);

  if(error){
    console.error(error);
    alert("Insert failed");
    return;
  }

  alert("Wallet updated");
  refreshAdminWallet();
}

/* ===============================
   REFRESH
=============================== */
async function refreshAdminWallet(){

  const txs = await fetchTransactions();

  const treasury = calculateTreasury(txs);

  renderSummary(treasury);
  renderTransactions(txs);

}

 </script>

</body>
</html>
