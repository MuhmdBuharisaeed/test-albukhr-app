<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALBUKHR Admin Access</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/albukhr-ui.css">
<link rel="stylesheet" href="css/admin-login.css">
  
</head>

<body>

<!-- ===== HEADER (Like Unified Admin) ===== -->
<header class="header">
  <img src="ALBUKHR_Logo_Optimized_1024x1024.png" class="main-logo">
</header>

<div class="login-wrap">
  <div class="login-card">

    <div class="brand">ALBUKHR • Admin Portal</div>
    <div class="subtitle">Role-based ecosystem access</div>

    <div class="form-group">
      <label>Admin Role</label>
      <select id="role">
        <option value="super_admin">Super Admin</option>
        <option value="finance_admin">Finance Admin</option>
        <option value="review_admin">Review Admin</option>
        <option value="viewer_admin">Viewer Admin</option>
      </select>
    </div>

    <div class="form-group">
      <label>Access Key</label>
      <input id="key" type="password" placeholder="Enter secure access key">
    </div>

    <button class="login-btn" onclick="login()">Access Control Center</button>

    <div class="note">
      Unauthorized access is strictly prohibited.
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase-core.js"></script>

<!-- Admin -->
<script src="js/supabase-admin-auth/admin-logs.js"></script>

<script src="js/supabase-admin-auth/admin-session.js"></script>

<script src="js/supabase-admin-auth/admin-auth.js"></script>

<script>

/* AUTO SESSION REDIRECT */

document.addEventListener("DOMContentLoaded", async ()=>{

const session =
await getCurrentAdmin();

if(session){

location.replace(
"unified-admin-buttons.html"
);

}

});

/* LOGIN */

async function login(){

const btn =
document.querySelector(".login-btn");

const role =
document.getElementById("role").value;

const key =
document.getElementById("key").value.trim();

if(!key){

alert("Access Key Required");

return;

}

/* USERNAME MAP */

const USERNAMES = {

super_admin:"admin",
finance_admin:"finance",
review_admin:"review",
viewer_admin:"viewer"

};

const username =
USERNAMES[role];

btn.disabled = true;
btn.textContent = "Signing In...";

try{

const result = await adminLogin({

email:
"albukhrinvestmentlimited@gmail.com",

accessKey:key

});

if(result.error){

alert(result.error);

return;

}

location.replace(
"unified-admin-buttons.html"
);

}catch(error){

alert(error.message || "Login failed");

}finally{

btn.disabled = false;
btn.textContent = "Access Control Center";

}

}

</script>

</body>
</html>
